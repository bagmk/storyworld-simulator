      FBI 소피아가 수민을 보호 명목으로 구금한다. 외부와 연락 차단.
      3자 협상(NSA/CIA/카르텔) 속에서 수민은 대배심 증언 압박을 받는다.
      소피아의 마지막 전화: 수민이 다른 삶을 선택할 수 있다는 제안. 수민은 거절한다.
