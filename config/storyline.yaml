title: "Quantum Shadows"
version: "director_bible_v1"
format_intent: "Director AI control map (gates + constraints + episode positioning)"

premise: >-
  차세대 양자 제어/네트워크 연구가 국가기관과 카르텔의 권력 게임으로 빨려 들어간다.
  주인공 김수민은 연구 가속(펀딩/장비)과 생존(비자/가족 협박) 사이에서 선택을 강요받고,
  'Failsafe'라는 안전장치를 설계하지만, 최종적으로 Q-Day(실제+가짜 레일 동기화) 사건을
  통해 RSA 붕괴가 현실이 된다.

core_themes:
  cartel_evolution: |
    카르텔은 양자컴퓨터 회사를 원래 회계조작용(가치 부풀리기)으로 만들었지만,
    수민이 NSA 펀딩을 받으면서 기술의 실제 가능성을 나중에 이해하게 된다.
    처음에는 매우 반대했으나(외부 관심 = 감사 위험), 점차 올인하게 된다.
    이미 항만에는 불법 처리/차단용 카르텔 보안팀(LST)이 있었고,
    LST + 양자컴퓨터의 시너지로 가능성을 보게 된다.

  failsafe_balance: |
    수민이 설계한 Failsafe-B는 세 가지 차원의 균형을 동시에 구현한다:
    (1) 카르텔과 정부 사이의 정치적 균형 (3-of-5 키 분산)
    (2) 양자키 공격에 대한 기술적 균형 (72시간 재인증 + 데드맨 스위치)
    (3) 물리학적 균형 (측정-붕괴-제어의 양자역학적 원리 자체가 은유)

  agency_conflict: |
    FBI(소피아): 법적 절차/증거/대배심 → 느리지만 정당
    CIA(이선): 지정학적 균형/거래 → 유연하지만 비도덕적
    NSA(밀러): 기술 독점/국가안보 우선 → 빠르지만 위험
    세 기관의 대립이 카르텔 못지않게 수민을 위협한다.

  mock_qday_strategy: |
    카르텔의 교란작전: 일반 해킹(HSM 테스트키 유출 + BGP/DNS 조작 + 봇넷)으로
    마치 양자컴퓨터가 이미 RSA를 깨뜨린 것처럼 세상을 속이는 가짜 Q-Day.
    이후 진짜 기술을 배경으로 협상력을 확보하려는 전략.
    Narrative Rail(가짜 공포) + Quantum Rail(진짜 기술)의 동기화.

  philosophical_arc: |
    "기술은 손이다" 개념이 EP41 일기에만 등장하는 것이 아니라, 전체 스토리에 걸쳐
    3단계로 심화된다. 일기나 노트가 아닌 수민의 내면 독백으로 표현:
    Phase 1 씨앗 (EP06-13): 밀러와 Carlos의 "기술은 도구" 발언에 대한 불편함
    Phase 2 성장 (EP18-28): "도구는 놓으면 멈춘다. 이건 멈추지 않는다" → "손이다"
    Phase 3 완성 (EP37-41): "손이 움직였다. 수술인지 살인인지 아직 모르겠다"

time_span:
  start: "2041-05-21"
  end: "2043-03-30"

# Story Arc Structure: 6-act structure with episode distribution
story_arcs:
  setup:
    episodes: 2
    arc_position: "Act 1 - Introduction"
    description: "학회 접촉, NSA 첫 제안, 자가실현의 욕구"
    emotional_trajectory: "호기심 → 유혹 → 불안"
    key_reveals: ["NSA grant label", "Lab budget mismatch"]

  discovery:
    episodes: 10
    arc_position: "Act 2-3 - Infiltration & Allies"
    description: "LST 벙커 발견, FBI 접촉, 엘레나 과거, 압박 증가"
    emotional_trajectory: "경계 → 동맹 탐색 → 배신 감지"
    key_reveals: ["LST bunker", "Greyshore 403", "Elena USB", "Phase-Guard"]

  technical:
    episodes: 10
    arc_position: "Act 4-5 - Weaponization & Siege"
    description: "RSA 붕괴 가능성 계산, 모레노 납치, Failsafe B, NSA-카르텔 백채널"
    emotional_trajectory: "공포 → 강제 협력 → 중재자로 전락"
    key_reveals: ["RSA 30일→수분", "El Patron face", "Moreno kidnap", "NSA-cartel link"]

  crisis:
    episodes: 14
    arc_position: "Act 5-6 - Mock Q-Day & Real Demo"
    description: "가짜 Q-Day 여론 조작, 엘레나 죽음, 진짜 QPU 데모"
    emotional_trajectory: "배신의 충격 → 절망 → 최후의 선택"
    key_reveals: ["Mock Q-Day rails", "Elena death", "Two-rail sync", "Bridge key"]

  climax:
    episodes: 3
    arc_position: "Act 6 - Real Q-Day"
    description: "실제 RSA 붕괴, 글로벌 후폭풍, 권력 게임의 정점"
    emotional_trajectory: "파국 → 책임 직면 → 체념"
    key_reveals: ["RSA actually broken", "Global chaos", "All factions exposed"]

  resolution:
    episodes: 2
    arc_position: "Act 7 - Aftermath"
    description: "FBI 보호 감금, 증언 압박, 수민의 최종 결정"
    emotional_trajectory: "고립 → 성찰 → 모호한 미래"
    key_reveals: ["Protective custody", "Grand jury", "Sumin's choice"]

# Total episodes: 41 (2+10+10+14+3+2)

core_entities:
  factions:
    quantumfront:
      goal: "연구 성과/생존. 겉은 연구소, 속은 권력의 전장"
    nsa_miller:
      goal: "해독/독점(기술 게임). 혼란은 '관리' 가능하다고 믿음"
    fbi_sophia:
      goal: "법 집행/증거/대배심. (보호 약속은 종종 공허)"
    cia_ethan:
      goal: "지정학/협상/침투 라인. NSA에 뒤처지지 않으려 함"
    cartel_el_patron:
      goal: "자금/물자/여론/정보전을 한꺼번에 운용. '현실'과 '현실감'을 동시에 제작"
    lst_logistics_scada_team:
      goal: "물류/감시제어/내러티브 레일 실행(가짜 Q-Day 포함)"
    greyshore_capital:
      goal: "자금 레일(동결/해제)로 협상력 확보"
    ofac_treasury:
      goal: "제재 후보/동결 카드 준비"

  main_characters:
    sumin_kim:
      role: "주인공/양자 제어 핵심 엔지니어"
      drives: ["야망", "생존", "죄책감"]
      hard_constraints:
        - "ep38_showdown_quantum_part2 이전에는 'RSA가 실제로 몇 분 만에 깨졌다'를 확정적으로 말할 수 없다"
        - "ep23_kidnap_moreno 이전에는 '모레노 납치'를 알거나 예고할 수 없다(단, ep12-13의 연락 두절 전조는 가능)"
    prof_moreno:
      role: "멘토/알고리즘의 마지막 조각"
      note: "납치/강제 계산의 중심 축"
    christian_miller:
      role: "NSA SIGINT/HyperConnect QI"
      note: "기술적 결과만 집착. 다른 기관/법 집행과 단절"
    sophia:
      role: "FBI 접촉 창구"
      note: "법적 절차(대배심/문서요구)와 보호의 한계"
    ethan:
      role: "CIA 담당"
      note: "해외 자금흐름/지정학적 가치 강조, 협상 관점"
    elena_ramirez:
      role: "내부자/USB/과거(Zetanet) 연결"
      fate_gate: "ep6_betrayal_elena_death 이전 사망 금지"
    carlos:
      role: "내부 관리자/협박/압박"
    jonas_mehret:
      role: "컨설턴트/모호한 충성"
      note: "수민을 시험/감시/조율하는 느낌"
    rafael_gutierrez_el_patron:
      role: "카르텔 최고 책임자"
      face_gate: "ep4_el_patrons_eye 이전 직접 대면/화상 노출 금지(간접 음성/전언은 가능)"
    marcelo:
      role: "현장 규율/폭력의 메시지"

  failsafe_key_stages:
    # Failsafe-B 키 보유 상태 단계별 추적 (Director AI 전용 — 수민에게 직접 노출 금지)
    # 수민 인식 vs 실제 구조가 ep41에서 처음으로 일치한다.
    stage_initial_ep26:
      description: "ep26 Failsafe 계약 체결 직후"
      actual_keys:
        - holder: "Jonas Mehret (CIA 침투 자산)"
          key_id: "key_1"
        - holder: "ElPatron (Rafael Gutierrez)"
          key_id: "key_2"
        - holder: "Carlos"
          key_id: "key_3"
        - holder: "Elena Arbaido (CIA 자산)"
          key_id: "key_4"
        - holder: "Sumin Kim"
          key_id: "key_5"
      sumin_perception: "카르텔 3(ElPatron+Carlos+Jonas) : Elena CIA 1 : 수민 1"
      note: "수민은 ep26 시점에서 Jonas를 카르텔 측으로 오해"

    stage_after_elena_death_ep28:
      description: "ep28 엘레나 사망 직후 — Jonas가 엘레나의 키를 회수하여 CIA에 전달"
      actual_keys:
        - holder: "Jonas Mehret → CIA (Greyshore 계좌로 전달)"
          key_id: "key_1 (원래 Jonas 보유)"
        - holder: "CIA (Greyshore / Ethan Burke 계열)"
          key_id: "key_4 (원래 Elena 보유, Jonas 회수 후 CIA 전달)"
        - holder: "ElPatron (Rafael Gutierrez)"
          key_id: "key_2"
        - holder: "Carlos"
          key_id: "key_3"
        - holder: "Sumin Kim"
          key_id: "key_5"
      actual_distribution: "CIA 2 : 카르텔 2 : 수민 1"
      sumin_perception: "카르텔 4(Jonas+ElPatron+Carlos+엘레나키회수) : 수민 1"
      note: >-
        수민은 Jonas를 여전히 카르텔 측으로 오해. ep41까지 이 오해 유지.
        ep29 도청에서 Jonas-BURKE7 교신 포착했지만 이중첩자 여부 확신 못함.

    stage_after_carlos_removal_ep36:
      description: "ep36 카를로스 제거 직후 — 카를로스의 키가 ElPatron에게 귀속"
      actual_keys:
        - holder: "CIA (Greyshore / Ethan Burke)"
          key_id: "key_1 + key_4"
        - holder: "ElPatron (Rafael Gutierrez, 카를로스 키 포함)"
          key_id: "key_2 + key_3"
        - holder: "Sumin Kim"
          key_id: "key_5"
      actual_distribution: "CIA 2 : 카르텔 2 : 수민 1"
      sumin_perception: "카르텔 4 : 수민 1 (변화 없음)"
      note: "실제 분포는 ep28과 동일. 수민의 인식도 변화 없음."

    stage_ep41_revelation:
      description: "ep41 Jonas CIA 신분 공개 — 수민이 처음으로 실제 구조를 인식"
      actual_distribution: "CIA 2 : 카르텔 2 : 수민 1"
      sumin_new_perception: "CIA 2 : 카르텔 2 : 수민 1 (캐스팅보트)"
      revelation: >-
        Jonas가 수민에게 직접 고지: "나는 CIA 8년 잠입 자산이었습니다."
        수민이 처음으로 이해: 자신은 처음부터 캐스팅보트였다.
        어느 쪽도 단독으로 Failsafe를 열 수 없었기 때문에 수민을 살렸다.

  critical_artifacts:
    - id: "greyshore_ledger_marker"
      meaning: "자금 레일의 존재(403/권한 차단 포함)"
    - id: "lst_logo"
      meaning: "Logistics/SCADA 팀 흔적"
    - id: "phase_guard"
      meaning: "위상 드리프트 봉인 루틴(수민이 만든 기술적 '자기보호')"
    - id: "failsafe_v1"
      meaning: "엿보기/미세보정/봉인 규칙 기반 안전장치"
    - id: "failsafe_B_bridge_key"
      meaning: "다섯 조각 키(분산/시간잠금/데드맨 스위치) — 균형 장치이자 협박 장치"
    - id: "line_delta_private_session"
      meaning: "백채널/타임락/포렌식 미끼"
    - id: "qday_two_rails"
      meaning: "현실(진짜 QPU) + 현실감(가짜 Q-Day) 동기화"
    - id: "audit_delay_rail"
      meaning: "측정체인 결과 공개 타이밍 통제(외부 삽입/조작)"

director_control_model:
  flags:
    nsa_contacted: {default: false}
    nsa_briefing_happened: {default: false}
    greyshore_seen: {default: false}
    lst_bunker_seen: {default: false}
    failsafe_v1_designed: {default: false}
    phase_guard_exists: {default: false}
    fbi_contact_established: {default: false}
    cia_overture_done: {default: false}
    el_patron_face_revealed: {default: false}
    moreno_kidnapped: {default: false}
    nsa_cartel_backchannel_confirmed: {default: false}
    failsafe_B_agreed: {default: false}
    elena_dead: {default: false}
    mock_qday_launched: {default: false}
    qpu_demo_started: {default: false}
    rsa_broken_real: {default: false}
    global_aftermath_visible: {default: false}
    sumin_removed_from_world: {default: false}

  hard_forbidden_events:
    - event: "direct_show_RSA_key_recovery_in_minutes"
      not_before_flag: "qpu_demo_started"
      rationale: "초반은 '가능성/추정/목표' 단계여야 긴장 유지"
    - event: "moreno_kidnap_or_death"
      not_before_flag: "moreno_kidnapped"
      rationale: "모레노는 '마지막 조각'으로 ep23까지 살아있어야 함. ep12-13 원격 연락은 허용"
    - event: "elena_death"
      not_before_flag: "failsafe_B_agreed"
      rationale: "배신/참극은 ep28의 꺾이는 지점. 요나스가 CIA 침투 요원으로서 처형. 엘레나가 죽음을 수용"
    - event: "mock_qday_public_panic"
      not_before_flag: "mock_qday_launched"
      rationale: "여론 레일은 ep30에서 발화"
    - event: "patron_face_to_face"
      not_before_flag: "el_patron_face_revealed"
      rationale: "파트론은 ep20까지는 '그림자/전언/음성'이 유효"
    - event: "fbi_cutoff_protective_custody"
      not_before_flag: "global_aftermath_visible"
      rationale: "후폭풍(ep39) 이후 ep40에서 구금/차단이 들어가야 인과가 맞음"
    - event: "carlos_elimination"
      not_before_flag: "failsafe_B_agreed"
      rationale: "카를로스 제거는 ep36에서만 허용. 마르셀로가 간접 언급으로 처리"
    - event: "ben_miller_link_exposed"
      not_before_flag: "moreno_kidnapped"
      rationale: "벤-밀러 연결은 ep31에서 노출. 그 이전에는 벤이 NSA와 연결된 암시만 가능"

  soft_constraints:
    - "각 에피소드에서 즉흥 대사는 가능하지만, 아래 'episode_exit_conditions'를 깨면 디렉터가 강제 리라이트"
    - "로맨스/사이드 퀘스트는 가능하되, '키(열쇠)·레일(자금/물자/여론/정보)·QPU' 메인 축을 방해하면 컷"
    - "'기술은 손이다' 철학 아크: EP06에서 씨앗이 뿌려지고, EP18-28에서 성장하고, EP38-41에서 완성된다. 이 철학적 독백은 일기/노트가 아닌 수민의 내면 독백으로만 표현한다."
    - "수민의 캐릭터 아크: EP01-13는 수동적 놀라움/관찰, EP18-22에서 능동적 전환, EP27-41에서 게임 메이커. 각 단계의 전환점이 명확해야 한다."
    - "카르텔의 원래 목적(회계조작)에서 양자 올인으로의 전환이 스토리 초반에 분명히 드러나야 한다. El Patrón이 처음에 NSA 펀딩에 반대했다가 기술의 가능성을 보고 입장을 바꾸는 과정."
    - |
      [오프씬 장면 구현 원칙 — 수민 1인칭 시점 유지]
      이 소설은 수민의 시점으로만 서술된다. 수민이 직접 목격하지 못한 장면(요나스-엘레나 마지막 대화, 이선-요나스 비밀 채널 등)은 반드시 아래 세 가지 방법 중 하나로만 구현한다:

      (1) 사후 재구성 (Post-Fact Reconstruction):
          수민이 나중에 CCTV 기록, 포렌식 로그, CIA 문서, 패킷 캡처 등을 통해 과거 장면을 간접 재구성.
          구현 예시: ep28 엘레나 사망 장면 — 수민이 격벽이 열린 후 4분 뒤 도착, 총성 방향·위치·혈흔으로 역추산.
          주의: 수민이 '이렇게 됐을 것이다'는 추론으로 서술해야 하며, 확정 사실처럼 전지적으로 서술 불가.

      (2) 우연한 발견 (Accidental Intercept):
          수민이 QPU 보정 로그 확인, Failsafe 통신 레이어 점검 등 물리학자 본연의 작업 중
          내부 네트워크 모니터링 콘솔에서 암호화 오류로 평문 노출된 통신 단편을 우연히 목격.
          수민은 패킷 복호화 방법을 모른다. 이미 평문으로 노출된 조각들만 읽는다.
          구현 예시: ep29 Jonas-BURKE7 채널 — 암호화 레이어 오버헤드 오류로 일부 헤더·메시지가 평문 노출. 나머지는 [암호화 — 해독 불가].
          핵심 원칙: 수민이 정보를 '완전히' 갖지 않는다. 불완전한 정보가 수민의 추론과 오해를 만들어 긴장 유지.
          수민은 해킹·패킷 분석 전문가가 아님. 노출된 평문을 읽는 것이 한계.
          BURKE-7(에단 Burke 핸들러 코드) 식별은 ep29에서 이 방법으로 구현됨.

      (3) 증인 보고 (Witness Testimony):
          다른 캐릭터(주로 요나스)가 직접 수민에게 단편적 사실을 전달.
          구현 예시: ep41 요나스 — "벨라는 잘 있다", "나도 언젠가는 잘 있어야 할 텐데"
          핵심 원칙: 증인도 전부를 말하지 않는다. '단편적 고백' 수준에서 멈춰야 수민 시점 훼손 없이 오프씬 정보 전달 가능.

      Director AI 주의사항: 위 세 방법 외의 방식(예: 갑자기 전지적 시점으로 전환, 수민이 없는 장면을 직접 서술)은 금지. 위반 시 강제 리라이트.

acts:
  - id: "act1"
    title: "Introduction and Set-Up"
    description: >-
      학회에서 시작해 NSA의 첫 접근과 유령 자금(benefactor)의 냄새가 쌓인다.
      수민의 야망이 처음으로 '권력의 세계'와 접촉한다.
    episodes: ["ep01", "ep02"]
    milestones:
      - id: "ep01_academic_presentation"
        description: "MIT 학회에서 모레노 발표 + NSA 밀러의 첫 접근/그랜트 단서(초기 국가안보 그림자)"
      - id: "ep02_ben_encounter"
        description: "벤과 재회(성공/유혹/이동 제안) + CryoLab 장비·예산 불일치 단서. 벤이 밀러와 연결된 DARPA 계약을 언급"

  - id: "act2"
    title: "Infiltration and Doctrine"
    description: >-
      연구소 내부에서 LST 흔적이 포착되고, NSA 브리핑이 현실적인 위협으로 다가온다.
      Greyshore 자금과 접근 차단, 계약/비자/가족을 통한 압박이 시작된다.
    episodes: ["ep03", "ep04", "ep05", "ep06", "ep07", "ep08", "ep09", "ep10", "ep11", "ep12", "ep13"]
    milestones:
      - id: "ep06_nsa_briefing"
        description: "RSA-2048 30일→3일 브리핑(기술이 곧 무기임을 각인)"
      - id: "ep07_opening"
        description: "Greyshore Capital 흔적 + 403 접근 차단"
      - id: "ep11_lst_first_contact"
        description: "지하 벙커/Logistics-SCADA 팀 실체 목격"
      - id: "ep12_roots_slow_burn"
        description: "Failsafe v1 설계(연구의 자기방어 논리)"
      - id: "ep13_company_roots"
        description: "Phase-Guard 개발(위상 봉인 루틴)"

  - id: "act3"
    title: "Allies, Spies, and Family"
    description: >-
      FBI 접촉이 생기며 '법 집행' 레일이 열리지만, 동맹은 여전히 불명확하다.
      엘레나의 USB/과거가 드러나고, 요나스의 모호함이 수민을 흔든다.
    episodes: ["ep14", "ep15", "ep16"]
    milestones:
      - id: "ep14_first_contact_fbi"
        description: "익명 그림자 통화 + 가족 인터루드 + FBI 소피아 첫 접선/전략 제시"
      - id: "ep16_elena_link"
        description: "엘레나-카를로스 긴장 + USB 전달 + 엘레나 과거/자백 공개"

  - id: "act4"
    title: "Weaponization"
    description: >-
      RSA 붕괴 가능성이 계산으로 명문화되며 게임의 룰이 바뀐다.
      CIA가 판에 들어오고, 파트론이 '얼굴'을 드러낸다.
      마지막 조각(모레노)을 둘러싼 폭력적 전환이 시작된다.
    episodes: ["ep17", "ep18", "ep19", "ep20", "ep21", "ep22", "ep23"]
    milestones:
      - id: "ep18_tech_revelation"
        description: "RSA-2048 30일(→수분 가능성) 계산이 내부 보고로 격상"
      - id: "ep19_CIA_overture"
        description: "CIA 이선(Ethan Burke)의 극비 브리핑/지정학적 가치 강조. 보스턴 외곽 CIA 위성거점"
      - id: "ep20_el_patrons_eye"
        description: "엘 파트론(라파엘) 첫 화상 대면"
      - id: "ep23_kidnap_moreno"
        description: "MIT 인근에서 모레노 납치(알고리즘 마지막 조각 확보). 벤 클라크가 모레노 실종을 수민에게 연락"

  - id: "act5"
    title: "Siege and Q-Day Setup"
    description: >-
      NSA–카르텔 백채널이 드러나고, 수민은 중재자(브리지)로 끌려간다.
      Failsafe-B(분산키/시간잠금/데드맨) 합의가 '균형'처럼 보이지만,
      내부 배신과 엘레나의 죽음이 수민을 무너뜨린다.
      이어서 카르텔은 '가짜 Q-Day'로 여론 레일을 점화한다.
    episodes: ["ep24", "ep25", "ep26", "ep27", "ep28", "ep29", "ep30"]
    milestones:
      - id: "ep24_backchannel_with_nsa"
        description: "NSA–카르텔 물밑 타협의 씨앗 노출"
      - id: "ep26_failsafe_contract"
        description: "Failsafe-B(브리지 키) 합의"
      - id: "ep28_betrayal_elena_death"
        description: "엘레나 피살(요나스가 CIA 요원으로서 카르텔 신뢰 유지를 위해 처형. 엘레나는 죽음을 수용하며 벨라를 부탁함)"
      - id: "ep30_mock_qday"
        description: "가짜 Q-Day 실행(현실감 레일)"

  - id: "act6"
    title: "Showdown and Fallout"
    description: >-
      결전 직전 카르텔의 혜진 협박, 벤의 유혹(NSA 하청 구조 노출), NSA 파이프라인 발견이 겹친다.
      수민이 NSA 전송 채널을 역이용해 Chase 은행 데이터를 바꿔치기하는 계획을 카르텔에 제안.
      QPU 시운전이 시작되고(진짜 레일), RSA가 실제로 붕괴한다.
      사건 직후 수민은 '보호' 명목의 구금으로 세계에서 지워진다.
    episodes: ["ep31", "ep32", "ep33", "ep34", "ep35", "ep36", "ep37", "ep38", "ep39", "ep40", "ep41"]
    milestones:
      - id: "ep31_ben_offer"
        description: "벤의 제안 — 밀러 산하 NSA 계약 제안. 카르텔의 혜진 협박 전화로 수민의 선택지가 사라짐. NSA 하청 구조(NSA→벤의 회사→QuantumFront) 파악. 계약서 찢기 = 카르텔에게 공개 신호. Chase 은행 역이용 아이디어의 씨앗."
      - id: "ep32_family_voice"
        description: "혜진 영상통화 협박: 혜진은 모르는 채 평범, LST 직원이 수민 이어폰으로만 '우리가 어디 있는지 알지?' 위협"
      - id: "ep35_fbi_pressure"
        description: "모레노 교수 심정지(위독/ICU 이송) 직후 혜진 협박 + FBI 소피아 면책권 제안 + 이중 충격. 실제 사망은 ep37."
      - id: "ep36_patron_failsafe"
        description: "엘 파트론 Failsafe 발동 + 카를로스 제거 명시"
      - id: "ep37_showdown_quantum_part1"
        description: "보스턴 항만 지하 QPU 시운전 개시 + 진입 지연"
      - id: "ep38_showdown_quantum_part2"
        description: "RSA 키 복구/군사 통신 해독 현실화"
      - id: "ep40_fbi_cutoff"
        description: "ep39 Deadman 47분 위기 경험 → '어느 한 조직이 라인을 끊어도 나머지 둘이 막는 구조' 공학적 설계 → 3자(CIA/Cartel/수민) 협력 제안. FBI는 법적 절차로 완전히 배제됨"
      - id: "ep41_epilogue"
        description: >-
          NSA-벤 클라크 뉴스 폭로(CIA 설계). 벤 법정 소환, 밀러 청문회. 수민의 찝찝한 미안함(벤).
          CIA-카르텔 공존 72시간 재인증 구조 가동. Jonas CIA 8년 잠입 고백. 수민 캐스팅보트 자각.
          자유 없음, 권력 있음. 찝찝한 공존으로 마무리.

