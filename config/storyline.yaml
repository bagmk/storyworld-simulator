      수민은 자신이 만든 시스템이 이미 다른 힘에 의해 관찰되고 있음을 깨닫는다.
    beats:
      - {id: "ep27_the_line", must_happen: true}
    exit_conditions:
      set_flags: {}

  - episode_id: "ep28"
    file: "ep28_betrayal_elena_death.yaml"
    title: "Betrayal: Elena's Death"
    act: "act5"
    date_range: {start: "2043-03-19T23:30", end: "2043-03-19T23:59"}
    synopsis: >-
      요나스가 엘레나를 처형한다. 요나스는 CIA가 카르텔 내부에 심어놓은 장기 침투 요원.
      카르텔 밖에서 처형팀이 대기한 상황에서, 요나스가 직접 처리함으로써 카르텔 신뢰를 유지하고
      수민의 정보를 보호한다. 엘레나는 CIA임을 알아채고 "벨라 찾아줄 수 있어?"라고 묻는다.
      요나스가 고개를 끄덕인다. 엘레나가 눈을 감는다.
    beats:
      - {id: "ep28_betrayal_elena_death", must_happen: true}
      - {id: "ep28_yonas_elena_final_moment", must_happen: true}
    exit_conditions:
      set_flags:
        elena_dead: true

  - episode_id: "ep29"
    file: "ep29_shift_allegiance.yaml"
    title: "Shift of Allegiance"
    act: "act5"
    date_range: {start: "2043-03-21T18:20", end: "2043-03-21T23:59"}
    synopsis: >-
      FBI/CIA/NSA의 무능과 위선이 드러나며 수민이 카르텔 쪽으로 기울기 시작한다.
      벤 클라크가 모레노 소식 없음에 당황해하며 재연락. 수민은 진실을 말할 수 없다.
    beats:
      - {id: "ep29_shift_allegiance", must_happen: true}
    exit_conditions:
      set_flags: {}

  - episode_id: "ep30"
    file: "ep30_mock_qday.yaml"
    title: "Mock Q-Day"
    act: "act5"
    date_range: {start: "2043-03-22T00:00", end: "2043-03-22T16:30"}
    synopsis: >-
      카르텔이 진짜 QPU 없이 공포를 퍼뜨리는 가짜 Q-Day를 실행한다.
      17초 위상 오프셋으로 내러티브 레일과 양자 레일을 동기화한다.
    beats:
      - {id: "ep30_mock_qday", must_happen: true}
    exit_conditions:
      set_flags:
        mock_qday_launched: true

  - episode_id: "ep31"
    file: "ep31_ben_offer.yaml"
    title: "Ben's Final Offer"
    act: "act6"
    date_range: {start: "2043-03-23T20:15", end: "2043-03-23T23:59"}
    synopsis: >-
      벤 클라크가 밀러 산하 NSA 계약을 제안한다. 이 시점에서 벤-밀러 협력 관계가 노출된다.
      수민은 NSA 백도어 키 하이재킹을 발견하고 이를 역이용해 벤을 함정에 빠뜨리는
      능동적 선택을 한다. 계약서를 찢는다.
    beats:
      - {id: "ep31_ben_offer", must_happen: true}
      - {id: "ep31_sumin_hijacks_nsa_key", must_happen: true}
    exit_conditions:
      set_flags: {}

  - episode_id: "ep32"
    file: "ep32_family_voice.yaml"
    title: "Family Voice"
    act: "act6"
    date_range: {start: "2043-03-24T09:00", end: "2043-03-24T12:00"}
    synopsis: >-
      혜진 영상통화. 혜진은 아무것도 모른 채 평범하게 등장.
      카메라 뒤 소파에 LST 직원이 앉아 커피를 마시고 있다.
      수민의 이어폰에만 들리는 채널: "학교 근처 카페 자주 가시는 것 같던데."
    beats:
      - {id: "ep32_family_voice", must_happen: true}
    exit_conditions:
      set_flags: {}

  - episode_id: "ep33"
    file: "ep33_nsa_tampering.yaml"
    title: "NSA Tampering"
    act: "act6"
    date_range: {start: "2043-03-24T18:00", end: "2043-03-24T23:59"}
    synopsis: >-
      수민이 NSA가 측정체인에 백도어를 심었음을 발견한다.
      YM 이니셜이 삽입된 딜레이 레일. 수민은 이를 조용히 문서화한다.
    beats:
      - {id: "ep33_nsa_tampering", must_happen: true}
    exit_conditions:
      set_flags: {}

  - episode_id: "ep34"
    file: "ep34_compliance_demoe.yaml"
    title: "Compliance Demo"
    act: "act6"
    date_range: {start: "2043-03-25T09:00", end: "2043-03-25T22:00"}
    synopsis: >-
      모레노 팀이 강제 실행을 시작한다. 모레노의 알고리즘이 처음으로 실제 작동한다.
      모레노는 학생들을 위해 실행을 진행하며 손이 떨린다.
    beats:
      - {id: "ep34_compliance_demoe", must_happen: true}
    exit_conditions:
      set_flags: {}

  - episode_id: "ep35"
    file: "ep35_fbi_pressure.yaml"
    title: "FBI Pressure + Hyejin Threat"
    act: "act6"
    date_range: {start: "2043-03-26T09:00", end: "2043-03-26T22:00"}
    synopsis: >-
      모레노 교수가 과로사로 위장된 근-암살로 사망한다. 수민에게 이중 충격이 덮친다.
      FBI 소피아의 압박과 동시에, 카를로스가 혜진 협박 영상통화를 트리거한다.
      혜진은 모르고, LST 직원이 이어폰으로만 수민에게 속삭인다.
    beats:
      - {id: "ep35_fbi_pressure", must_happen: true}
      - {id: "ep35_hyejin_video_threat", must_happen: true}
    exit_conditions:
      set_flags: {}

  - episode_id: "ep36"
    file: "ep36_patron_failsafe.yaml"
    title: "El Patron's Failsafe"
    act: "act6"
    date_range: {start: "2043-03-27T09:00", end: "2043-03-27T22:00"}
    synopsis: >-
      엘 파트론이 Failsafe를 발동하며 카를로스를 제거한다(더 이상 프로젝트에 없음 명시).
      마르셀로가 "그는 더 이상 이 프로젝트에 없어"라고 짧게 말할 뿐.
      엘 파트론도 자신이 만든 것에 갇혔음을 거울 앞 2초의 정지가 보여준다.
    beats:
      - {id: "ep36_patron_failsafe", must_happen: true}
      - {id: "ep36_carlos_removed", must_happen: true}
    exit_conditions:
      set_flags: {}

  - episode_id: "ep37"
    file: "ep37_showdown_quantum_part1.yaml"
    title: "Showdown: Quantum Part 1"
    act: "act6"
    date_range: {start: "2043-03-27T23:00", end: "2043-03-28T06:00"}
    synopsis: >-
      보스턴 항만 지하 QPU 시운전이 개시된다. 카를로스의 자리가 비어 있다.
      마르셀로가 진입을 통제한다. 첫 번째 RSA 키 복구 시도 시작.
    beats:
      - {id: "ep37_showdown_quantum_part1", must_happen: true}
    exit_conditions:
      set_flags:
        qpu_demo_started: true

  - episode_id: "ep38"
    file: "ep38_showdown_quantum_part2.yaml"
    title: "Showdown: Quantum Part 2"
    act: "act6"
    date_range: {start: "2043-03-28T06:00", end: "2043-03-28T18:20"}
    synopsis: >-
      RSA 키 복구/군사 통신 해독 현실화. 2:2 교착 상태에서 수민이 캐스팅 보트.
      "손이 움직였다. 내 손이. 수술인지 살인인지 아직 모르겠다." 철학적 아크 완성.
    beats:
      - {id: "ep38_showdown_quantum_part2", must_happen: true}
    exit_conditions:
      set_flags:
        rsa_broken_real: true

  - episode_id: "ep39"
    file: "ep39_aftermath.yaml"
    title: "Aftermath"
    act: "act6"
    date_range: {start: "2043-03-28T18:20", end: "2043-03-29T12:00"}
    synopsis: >-
      RSA 붕괴의 여파가 전 세계 금융/군사/통신에 퍼진다.
      모든 세력이 수민을 확보하거나 제거하려 움직인다.
    beats:
      - {id: "ep39_aftermath", must_happen: true}
    exit_conditions:
      set_flags:
        global_aftermath_visible: true

  - episode_id: "ep40"
    file: "ep40_fbi_cutoff.yaml"
    title: "FBI Cutoff"
    act: "act6"
    date_range: {start: "2043-03-29T12:00", end: "2043-03-30T22:00"}
    synopsis: >-
      FBI 소피아가 수민을 보호 명목으로 구금한다. 외부와 연락 차단.
      3자 협상(NSA/CIA/카르텔) 속에서 수민은 대배심 증언 압박을 받는다.
      소피아의 마지막 전화: 수민이 다른 삶을 선택할 수 있다는 제안. 수민은 거절한다.
    beats:
      - {id: "ep40_fbi_cutoff", must_happen: true}
    exit_conditions:
      set_flags: {}

  - episode_id: "ep41"
    file: "ep41_epilogue.yaml"
    title: "Epilogue: Exile"
    act: "act6"
    date_range: {start: "2043-03-30T23:15", end: "2043-03-30T23:15"}
    synopsis: >-
      RSA 붕괴의 여파로 학계/산업/정보기관 판도가 뒤집힌다.
      진상은 은폐되고, 연구소는 역사에서 삭제되며, 수민은 사실상 연금/유배로 사라진다.
      요나스가 커피를 가져오며 "벨라는 잘 있다"라고 말한다.
      수민이 72시간마다 세계를 멈추거나 돌릴 수 있는 권력을 얻지만, 자유는 잃는다.
    beats:
      - {id: "ep41_epilogue", must_happen: true}
    exit_conditions:
      set_flags:
        sumin_removed_from_world: true

director_runtime_playbook:
  episode_handout_protocol:
    - "Director에게는 'episodes[episode_id]' 하나만 전달 가능"
    - "그때 Director는 반드시 'acts'와 'director_control_model.hard_forbidden_events'를 함께 로드"
    - "Director는 각 씬에서 발생 이벤트를 flags에 반영하고, not_before를 위반하면 즉시 씬을 리다이렉트"
  redirect_strategies:
    premature_reveal:
      rsa_real_break_too_early:
        do:
          - "대사를 '가능성/추정/목표/시뮬레이션 결과'로 낮춤"
          - "실측 로그/키 출력 화면은 금지(모니터는 노이즈/에러/부분 출력만)"
      patron_face_too_early:
        do:
          - "전언/대리인/합성 음성/문서 서명으로 대체"
      moreno_event_too_early:
        do:
          - "납치 대신 '이동 제한/감시/연락 두절 전조'로 다운그레이드"
    alliance_drift:
      sumin_turns_cartel_too_early:
        do:
          - "수민의 동기는 '생존'과 '통제 욕망' 사이에서 흔들리게만 유지"
          - "결정적 배신(군사 키 전달)은 ep8_part2에서만 허용"
