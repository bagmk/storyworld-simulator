  - episode_id: "ep41"
    file: "ep41_epilogue.yaml"
    title: "Epilogue: Exile"
    act: "act6"
    date_range: {start: "2043-06-15T09:00", end: "2043-06-15T10:00"}
    synopsis: >-
      Q-Day + 80일. NSA-벤 클라크 연결고리가 뉴스에 폭로되고 벤의 회사는 SEC 조사와 법정 소환에 직면한다.
      모든 법적 책임의 화살표는 NSA를 향한다—CIA가 설계한 결말이다.
      수민은 이것이 CIA의 작품임을 알지만 벤에게 미안하다는 말을 소리 내어 할 수 없다.
      72시간 재인증: CIA(이선)와 카르텔(라파엘)이 동시 접속, 수민이 중간에서 열쇠를 돌린다.
      CIA-카르텔 공존 구조는 수민이 중재한 딜이다. 악당은 NSA다.
      Jonas가 CIA 8년 잠입 자산이었음을 수민에게 처음 고백하고, 수민은 처음으로 캐스팅보트였음을 깨닫는다.
      자유는 없다. 하지만 권력은 있다. 찝찝한 공존으로 끝.
    beats:
      - {id: "ep41_epilogue", must_happen: true}
    exit_conditions:
      set_flags:
        sumin_removed_from_world: true
        nsa_exposed_as_villain: true
        cia_cartel_coexistence: true

director_runtime_playbook:
  episode_handout_protocol:
    - "Director에게는 'episodes[episode_id]' 하나만 전달 가능"
    - "그때 Director는 반드시 'acts'와 'director_control_model.hard_forbidden_events'를 함께 로드"
    - "Director는 각 씬에서 발생 이벤트를 flags에 반영하고, not_before를 위반하면 즉시 씬을 리다이렉트"
  redirect_strategies:
    premature_reveal:
      rsa_real_break_too_early:
        do:
          - "대사를 '가능성/추정/목표/시뮬레이션 결과'로 낮춤"
          - "실측 로그/키 출력 화면은 금지(모니터는 노이즈/에러/부분 출력만)"
      patron_face_too_early:
        do:
          - "전언/대리인/합성 음성/문서 서명으로 대체"
      moreno_event_too_early:
        do:
          - "납치 대신 '이동 제한/감시/연락 두절 전조'로 다운그레이드"
    alliance_drift:
      sumin_turns_cartel_too_early:
        do:
          - "수민의 동기는 '생존'과 '통제 욕망' 사이에서 흔들리게만 유지"
          - "결정적 배신(군사 키 전달)은 ep8_part2에서만 허용"
