  date: "2043-03-23T20:15"
  location: "Downtown Ritz-Carlton Hotel — private lounge (38th floor)"
  summary: |
    [카르텔의 전화 — 2043-03-23T18:55]

    벤의 이메일이 도착하기 약 두 시간 전, 수민의 개인 휴대폰이 울린다. 등록되지 않은 번호. 수신.

    "김 박사님." 카를로스의 목소리다. 차분하고 낮다. "오늘 저녁 약속이 생겼다고 들었는데. 잘 생각하세요."

    수민이 답하기 전, 전화가 잠깐 끊기는 것 같더니 다른 소리가 들린다. 약한 배경 잡음. 그리고—

    "오빠."

    혜진의 목소리다. 두 글자. 그게 전부다. 하지만 수민은 온몸이 굳는다.

    카를로스의 목소리가 다시 돌아온다. "혜진 씨는 잘 있어요. 계속 그러길 바랍니다. 오늘 저녁 결정을 잘 하세요, 박사님." 전화가 끊긴다.

    수민은 10초 동안 전화기를 쥔 채 움직이지 못한다. 손이 떨린다. 혜진은 이미 카르텔 손 안에 있다. 언제부터인지는 모른다. 알 필요도 없다. 지금 수민에게 선택지는 없다.

    [호텔 — 2043-03-23T20:15]

    결전의 날을 3일 앞두고, MIT 시절 라이벌이었던 벤 클라크가 갑자기 수민에게 이메일로 연락해왔다. 제목: "Old friend—let's talk about your future." 수민은 그 이메일을 받은 순간부터 이미 알고 있었다. 이건 벤의 제안이 아니다.

    38층 프라이빗 라운지. 유리창 너머로 도시의 저녁 불빛이 깔린다. 테이블 위엔 이미 분할 계약서가 펼쳐져 있다.

    벤은 자리에 앉자마자 말을 꺼낸다. "Soomin, we've prepared this. Annual 12 million, complete RSA division leadership, 2.5 million stock options vesting over four years. We want you—not the code, YOU." 벤의 태도는 영업인의 차갑고 전문적인 톤이다. 계약서의 각 항목을 손가락으로 가리키며 설명한다. "Next 5 years, quantum market is ours. RSA implementation, government contracts, DARPA co-funding—all locked in. You're the missing piece."

    수민은 계약서를 받아든다. 읽는 척한다. 하지만 실제로 눈이 멈추는 건 파트너 목록이다. Palantir, Northrop Grumman, Booz Allen Hamilton, Lockheed Martin. 그 아래 주석: "All cleared for TS/SCI compartments—DARPA co-funding pre-negotiated."

    수민은 속으로 계산한다. 이 목록은 기업 제안이 아니다. Palantir는 NSA의 주요 데이터 분석 계약사다. Booz Allen은 NSA의 최대 외주 하청사다. 이 파트너 목록은 NSA 생태계 전체다. 벤의 회사는 그 생태계에서 '나쁜 일을 처리해주는 중간 회사'다. 기술을 가져오고, 일을 수행하고, 법적 문제가 생기면 없어지는 구조. 수민은 그 아래 들어가는 '기술 공급자'가 되는 것이다.

    그리고 지금 이 방 어딘가에서, 아마도 호텔 로비에서, 혹은 맞은편 건물에서, 라파엘의 사람이 이 장면을 보고 있을 것이다. 수민은 그것도 안다.

    벤이 계속 말한다. "너도 알겠지만, 이건 단순한 취직이 아니야. 우리 팀에 들어오면 넌 보호받아. 시민권도 내년 안에 확정되고, 가족도 이주를 도와줄 거야."

    가족. 수민은 두 시간 전에 들린 혜진의 목소리를 생각한다. "오빠."

    그리고 벤을 바라본다. 벤은 모른다. 이 제안이 누구의 지시로 만들어졌는지, 수민이 지금 어떤 상황에 있는지, 카르텔이 지금 어디서 이 장면을 주시하고 있는지. 벤은 그냥 모른다. 아마 영원히 모를 것이다. 그리고 수민은 그 사실에서 이상한 안도감과 함께 깊은 허탈감을 동시에 느낀다.

    수민이 입을 연다. 목소리는 낮고 차갑다. "벤, 연봉 1,200만 달러?" 수민이 계약서를 집어든다. 그리고 천천히 찢기 시작한다. 한 장, 두 장. 벤의 얼굴이 굳는다. "수민, 뭐 하는 거야—"

    수민은 찢으면서 생각한다. 이 장면을 보는 사람들이 있다. 카르텔의 눈이 있다. 나는 지금 그 눈들 앞에서 "나는 NSA 편이 아니다"를 선언하고 있는 것이다. 말이 아니라, 행동으로. 찢어진 계약서가 그 증거다.

    수민이 찢어진 계약서를 테이블에 던진다. "너 지금 나한테 '보호'를 약속했지? 시민권? 가족 이주?" 수민이 벤을 똑바로 쳐다본다. "벤, 나 지난 3주 동안 사람이 죽는 걸 봤어. 내 동료가 머리에 총 맞고 죽었어. 내 스승은 납치당했고. 그리고 너는 지금 여기 앉아서 '취직 제안'을 하고 있어?" 이 말들은 진짜다. 연기가 아니다. 수민의 분노는 진짜 분노다. 다만 그 분노가 지금 이 순간 계산된 방향을 갖게 됐을 뿐이다.

    벤이 당황한다. "수민, 무슨 소리를—" 수민이 벤의 말을 끊는다. "닥쳐, 벤. MIT 때도 그랬지. 넌 항상 현실을 몰라. 책상 앞에서 DARPA 계약서나 보고, 파트너 목록이나 자랑하고. 진짜 현장은 그렇게 안 돌아가."

    수민이 자리에서 일어난다. 벤을 내려다본다. "너 지금 Q-Day가 뭔지 알아? 너네 회사가 준비한 'RSA division'이 뭘 하게 될지 알아?" 벤이 입을 다문다. "몰라, 그치? 넌 그냥 정부 돈 받아서 회사 키우고, 주식 상장하면 되는 거니까." 그리고 나중에 법적 문제가 생기면 없어지면 되는 거고. 수민은 그 말은 하지 않는다.

    수민이 벤의 명함을 집어 든다. 그리고 천천히 찢는다. "그래서 말인데, 벤. 네가 정말로 이 시장을 '접수'하고 싶다면—나한테 구걸하러 와. 계약서 들고 오지 말고."

    수민이 돌아서서 나간다. 벤은 자리에 그대로 얼어붙어 있다. 찢어진 계약서와 명함만 테이블 위에 남았다.

    복도로 나온 수민은 손이 아직 떨리고 있다는 것을 느낀다. 엘레베이터 문이 닫히고, 거울에 비친 자신의 얼굴을 본다. 낯설다. 이게 나인가? 아니면 나는 지금 혜진을 위해 연기를 하고 있는 건가? 그 경계를 더 이상 모르겠다.

    [호텔 복귀 후 — 2043-03-23T22:40]

    방으로 돌아온 수민은 호텔 책상에 앉아 계약서 파트너 명단을 다시 떠올린다. Palantir, Northrop Grumman, Booz Allen Hamilton, Lockheed Martin. 네트워크 추적이 필요 없다. 수민은 물리학자다. 하지만 이 이름들은 안다—대학원 시절 NSA 연구 보조금 신청서에서 줄줄이 등장하던 회사들이다. Palantir는 NSA의 XKEYSCORE 데이터 분석 계약사다. Booz Allen은 에드워드 스노든이 다니던 NSA 최대 외주 하청사다. 이 명단은 기업 파트너가 아니다. NSA 생태계다.

    수민은 미간을 짚는다. 벤이 저 명단을 들고 나타났다는 것은—벤이 밀러와 연결되어 있다는 것이다. NSA가 직접 계약할 수 없는 기술 영역을, 벤의 회사를 통해 확보하려는 구조. 수민은 그 아래 있는 '기술 공급자' 위치다. 법적 문제가 생기면 벤의 회사만 사라지고, NSA는 손을 턴다. 벤은 그걸 모른다.

    수민은 30분 동안 생각한다. NSA는 수민의 기술로 RSA 키 데이터를 가져간다. 벤의 회사는 그 실행 채널이다. 그리고 수민은 그 구조 전체의 기술 제공자 위치에 있다.

    그런데. 만약 그 구조를 역으로 사용하면?

    수민은 노트북 앞에 앉는다. 아직 계획이 완성되지 않았다. 하지만 씨앗이 생겼다. 벤의 회사를 통해 NSA에 전달되는 것처럼 보이는 데이터를. 실제로는 다른 무언가를 뚫는 데 사용한다면. 그 아이디어는 아직 흐릿하다. 하지만 수민은 그것을 메모해둔다. 언젠가 쓸 수 있다.

    그리고 혜진을 생각한다. "오빠." 두 글자. 수민은 노트북을 닫는다.

