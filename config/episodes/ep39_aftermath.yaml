  date: "2043-03-28T10:15"
  location: "Offsite secure location — intelligence briefing room"
  summary: |
    사건 후 12시간. 세계 금융 시장이 마비되었다. NYSE: -18.4% (일일 최대 낙폭). 런던증권거래소: -15.7%. 도쿄: -16.2%. SWIFT 시스템: 수동 모드로 전환 (자동화 신뢰 상실). 뉴욕 금융청: 긴급 기자회견 "RSA-2048 암호 체계의 완전성 재검증 명령". 각국 정보기관: 모든 지난 20년 통신에 대한 검증 작업 시작. 러시아, 중국은 "미국 정부가 기술을 독점하려는 음모"라고 선언. 유럽연합: 나토 동맹 협상 일시 중단.

    언론은 추측한다. 뉴욕타임스 헤드라인: "WHO BROKE QUANTUM ENCRYPTION? Government remains silent as financial chaos spreads." BBC: "Is RSA security now completely obsolete? Experts weigh in." 하지만 진실은 더 복잡하다. 미국 정부(NSA, CIA)와 어둠의 조직(카르텔/라파엘)이 이 기술을 두고 암묵적 협상을 시작했기 때문이다. 공식 발표는 없지만, 뒤에서 거래가 진행 중이다. 라파엘은 "SIGINT 독점을 포기하면, 우리는 이 기술을 묻을 것"이라고 제안한다. NSA는 "협상 테이블에 앉겠다"고 응한다.

    보스턴 항만 자유무역지구 지하 연구실은 "구조적 붕괴로 인한 사고"라고 발표된다. 공식 리포트: "2043년 3월 27일, 항만 지하 구조물의 냉각 시스템 폭발로 인한 대형 사고. 사상자 수: 미상 (기록 없음)." 모든 증거는 파괴되었다. 서버, 하드드라이브, 서류—모두 유실. 모레노 교수의 시신도 발견되지 않았다. 공식 기록에서는 "실종"이다.

    이선(CIA)은 침묵한다. 그는 자신이 본 것이 무엇인지 안다. 하지만 상관으로부터 명령이 내려온다. "파일을 닫아라. 이건 '국가안보 사유'로 비밀 유지된다. 대통령 지시." 이선은 파일 상자를 밀폐한다. 스탬프를 찍는다: CLASSIFIED - TOP SECRET/SCI.

    수민은 이미 '보호' 명목으로 FBI에 의해 연행되었다. 미국 정부는 수민을 공개적으로 추적하지 않는다. 더 나은 방법이 있기 때문이다. "피보호자 신분(protected person)"으로 등록시켜, 사실상 감금 상태에 둔다. 그의 가족(서울의 어머니, 혜진)과의 모든 연락은 차단된다. 핸드폰, 컴퓨터, 편지—모두 모니터링되거나 금지된다. 그는 자유 신분이지만 감옥 신분이다.

    수민은 호텔 방의 창문을 통해 뉴욕 하이라인을 본다. 세상은 계속 돈다. 금융인들이 회의실에 들어간다. 정보관계자들이 서류가방을 들고 간다. 아무도 모른다. 3월 27일 밤의 혼돈 속에서 무엇이 정말로 일어났는지. 그리고 수민은 그 혼돈의 주인공이다. 하지만 고독하게, 침묵 속에 갇혀 있다.

    [Deadman 위기 — 2043-03-28T18:55]

    FBI의 '보호 연행' 이후 10시간 40분. 수민의 손목 시계가 조용히 진동한다. 아무도 모르게 설정해둔 알람이다. 타이머 표시: 00:05:00.

    Failsafe-B가 QPU 시운전 시작(2043-03-27T19:44)과 동시에 첫 번째 72시간 재인증 카운트다운을 시작했다. 즉, 마감은 2043-03-29T19:44. 아직 25시간이 남아 있다.

    하지만 문제가 생겼다. 수민이 연행된 FBI 임시 시설—뉴욕 맨해튼 38번가 안전가옥—의 인터넷이 완전히 차단되어 있다. FBI의 표준 절차다. 수민은 BRIDGE_SLOT에 접근할 수 없다. 외부 통신이 없으면 72시간 재인증이 불가능하다. 재인증 실패 → Deadman trigger 자동 발동. 알고리즘 전세계 공개. 세계 금융 시스템 2차 충격.

    5분 타이머는 수민이 소시에게 말하기 전 마지막 내부 카운트다운이다.

    수민은 FBI 담당관을 부른다. 소피아는 없다. 다른 요원—이름도 모른다.

    수민: "인터넷이 필요합니다. 지금 당장."
    요원: "불가능합니다. 보안 프로토콜입니다."
    수민: "당신이 인터넷을 차단하면, 25시간 후 세계 금융 시스템이 다시 붕괴합니다. 제 말 이해하세요?"
    요원: "...무슨 말씀인지."
    수민: "소피아를 불러주세요. 지금."

    소피아는 15분 후 도착한다. 수민이 Failsafe-B 72시간 재인증 구조를 설명한다. 소피아의 얼굴이 창백해진다. 그녀는 즉시 긴급 라인으로 DOJ에 연락한다. "State Secrets Hold 예외 조항 요청—인터넷 접속 허가—국가 경제 안보 사유."

    DOJ 회신: 47분.

    타이머가 제로에 가까워진다. 수민의 손이 땀에 젖는다. 24시간 8분이 남았을 때—허가가 떨어진다. 격리된 단방향 인터넷 라인. 1개 포트만. 수민이 접속한다. BRIDGE_SLOT 인터페이스. 재인증 입력 시작.

    "72-hour authentication: PENDING. Enter passphrase."

    수민이 42자의 패스프레이즈를 입력한다. 느리게. 정확하게.

    "✓ Authentication confirmed. Next cycle: 2043-03-30T19:44."

    수민은 의자에 등을 기댄다. 소피아가 옆에 서 있다. "...이게 앞으로 계속인가요?" 수민이 대답한다. "72시간마다. 평생."

    소피아가 아무 말도 하지 않는다. 그 침묵이 대답이다.

