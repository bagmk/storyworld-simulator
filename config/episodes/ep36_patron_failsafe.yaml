  summary: |
    Q-Day 당일, 오전 6시 32분. 라파엘(엘 파트론)의 사무실. 한 통의 팩스가 기계에서 튀어나온다. Greyshore Capital Partners 계좌 동결 통지(OFAC Sanctions Order). 효력 발생: 24시간 이내. 그리고 35초 후, 두 번째 팩스. 보스턴 항만 자유무역지구 공급사 포털 공지: "URGENT: Cryogenic components order #NG-447-A suspended pending regulatory review. Estimated review period: 30-90 days." 냉각 부품이 끊긴다. 자금이 끊긴다.

    라파엘은 팩스를 내려놓고, 사무실 벽의 거울 앞에 선다. 2초. 55세의 얼굴. 잔주름. 30년의 피로가 새벽 조명 아래 드러난다. 거울 속의 남자는 카르텔의 수장이 아니라, 지친 기술자 출신의 늙은 남자다. 한때 자신도 수민처럼 코드를 쓰던 사람이었다. 그 코드가 조직을 만들었고, 조직이 제국을 만들었고, 제국이 자신을 삼켰다. 2초가 끝난다. 거울 속의 남자가 다시 엘 파트론이 된다. 표정이 바뀌고, 어깨가 펴지고, 눈빛이 차가워진다. 가면을 쓰듯.

    라파엘은 침착하다. 이미 예상했던 신호들이다. 그는 단 한 번의 휴대폰 통화를 한다. 목소리는 낮고 명확하다. "Failsafe 발동. 지금. 모든 수준에서." 그 말 한 마디로, 다섯 개의 대륙에 있는 다섯 명의 사람들이 각각 한 조각씩 키를 꺼낸다. Failsafe Key—5-of-5 Shamir Secret Sharing. 어떤 한 조각만으로는 아무것도 할 수 없다. 하지만 다섯 조각이 모이면, 극비 파일 드라이브를 열 수 있다. 그 안엔 RSA 해독 결과, 금융 라우팅 코드, 정부 기밀 위치, 그리고 NSA 내부의 각종 비밀이 들어 있다.

    "문(door)은 오늘 닫힌다. 우린 분산된 열쇠로 문을 걸어 잠근다. 그리고 협상할 때만 열쇠의 일부를 보여준다." 라파엘은 이제 정부와 협상 가능한 위치에 선다. 직접 QPU를 굴리지 않아도, 단지 정보를 조금씩 흘려주기만 해도 NSA는 움직일 수밖에 없다.

    동시에, 지상의 봇넷(botnet) 네트워크가 활성화된다. 가짜 Q-Day 시나리오가 SNS, 뉴스 사이트, 금융 시스템 경고 채널로 퍼진다. "QUANTUM THREAT LEVEL: CRITICAL." "MAJOR BANKS COMPROMISED." "MILITARY NETWORKS UNDER ATTACK." 진짜가 아닌 가짜 정보다. 하지만 세상은 패닉한다. 주가가 떨어진다. 금융 시장이 흔들린다. 이것이 '내러티브 레일(narrative rail)'이다.

    해질녘 7시 42분. 지하의 최종 QPU 시운전이 시작된다. 진짜 RSA 해독이 발생한다. 진짜 군사 통신이 해독된다. 이것이 '퀀텀 레일(quantum rail)'이다.

    두 개의 레일이 겹친다. 가짜 공포와 진짜 기술이. 세상은 패닉에 빠져 있고, 정부는 현실이 무엇인지 파악하지 못한다. 그 혼돈 속에서, 라파엘은 조용히 협상 테이블에 앉는다. "우린 두 개의 레일을 함께 돌린다. 하나가 현실을 만들고, 다른 하나가 현실감을 만든다. 그리고 둘 다 우리가 통제한다."

    수민은 이 말을 천천히 해석한다. '문(door)'은 자금 계좌. Greyshore 계좌가 동결됐으니, 라파엘은 그 계좌를 '문'이라 부른 것. '숨(breath)'은 물자 공급. 냉각 부품이 끊겼으니, 라파엘은 기술적 생명을 '숨'이라 부른 것. '귀(ear)'는 세상의 이목. 봇넷이 퍼뜨리는 가짜 정보가 세상의 귀를 사로잡는 것. 그리고 '열쇠(key)'—다섯 조각의 Failsafe Key가 모든 것을 통제한다.

    이 순간, 수민은 라파엘이 얼마나 큰 전략가인지 깨닫는다. 그는 단순히 기술만 가진 테러리스트가 아니다. 정보전, 심리전, 금융전을 동시에 펼치는 전술가다. 그리고 NSA는 이 게임에서 졌다.

    [수민의 역제안 — 2043-03-27T08:30]

    카를로스가 제거되기 45분 전. 수민은 라파엘에게 직접 연락을 요청한다. 이례적인 일이다.

    라파엘의 집무실. 두 사람만 있다. 수민이 먼저 말한다.

    "Phase-Guard 소스코드는 드릴 수 없습니다." 라파엘의 눈이 좁아진다. 수민이 계속한다. "그걸 드리면 저는 필요 없어지고, 혜진도 필요 없어지죠. 저는 그 구조를 이해합니다."

    수민이 노트북을 연다. "대신 이걸 드릴 수 있습니다. 밀러가 설치한 NSA 파이프라인이 있습니다. QPU 해독 결과를 NSA 서버로 자동 전송하는 채널입니다. 저는 그 채널을 통해 전송되는 데이터를 바꿀 수 있습니다. NSA는 POC가 성공했다고 인식합니다. 벤의 회사는 정상 작동한다고 생각합니다."

    "그 채널로 실제로 뚫는 건 NSA가 원하는 RSA 키가 아닙니다. Chase JP Morgan의 결제 라우팅 코드입니다. 금융 계좌 접근 키. Greyshore 제재로 묶인 자산보다 훨씬 큰 규모입니다."

    라파엘은 아무 말도 하지 않는다. 수민이 덧붙인다. "대가는 하나입니다. 혜진이 서울에서 안전하게 있어야 합니다. 그리고 이 작전이 끝난 후에도."

    라파엘이 천천히 고개를 끄덕인다. "누가 이 계획을 알고 있나?" 수민: "저뿐입니다." 라파엘: "CIA는?" 수민: "모릅니다. 아직."

    라파엘이 창밖을 바라본다. 보스턴 항만. 그리고 돌아선다. "진행해."

    [카를로스 제거 — 2043-03-27T09:15]

    오전 9시 15분. 라파엘의 두 번째 통화. 이번 수신자는 마르셀로(Marcelo)—카르텔 내부 감사 담당. 통화는 짧다. 4분 12초. 녹음 없음. 하지만 결과는 분명하다.

    한 시간 후, 지하 2층 카를로스의 사무실. 문이 열린다. 마르셀로와 두 명의 무장 요원이 들어선다. 카를로스는 책상에 앉아 있다. 손에는 커피 잔. 그는 이미 알고 있다는 듯한 표정으로 잔을 내려놓는다. 저항하지 않는다.

    마르셀로가 말한다. 스페인어. 차갑고 형식적이다. "카를로스, 당신의 역할은 이번 단계에서 종료되었습니다. 라파엘께서... 수고했다고 하십니다." 카를로스가 창 밖을 본다. 보스턴 항만. 컨테이너들. 새벽빛이 남아있는 하늘. "수고." 그는 짧게 반복하고, 일어선다. 짐을 싸지 않는다. 커피도 가져가지 않는다. 그냥 나간다.

    복도 CCTV 기록: 2043-03-27T10:17:33Z. 카를로스 마지막 접근 로그. 이후 기록 없음.

    10시 22분. 마르셀로가 라파엘의 집무실로 들어간다. 그의 손에 USB 드라이브 하나가 있다. 카를로스가 보관하던 Failsafe 키다. 라파엘이 받아 서랍에 넣는다. 말 없이. 이제 카를로스의 키는 라파엘(엘 파트론)이 보관한다.

