  summary: |
    [수민과 엘레나의 마지막 대화 — 2043-03-19 22:15]

    보스턴 항만 자유무역지구 지하 연구실 옥상 환기구 옆. 엘레나가 담배를 피우고 있다. 수민이 올라온다. 바람이 차갑다. 엘레나가 먼저 입을 연다. 평소의 날카로운 톤이 아니다. 낮고, 피곤하고, 솔직하다.

    "12년 전에 여동생이 사라진 날, 나는 세상이 끝났다고 생각했어." 담배 연기가 야경 위로 흩어진다. "근데 세상은 안 끝나더라. 그냥 내가 끝난 거지." 수민이 아무 말 없이 옆에 선다. "Bella는 대학 2학년이었어. 택시를 탔는데 그냥... 사라졌어. 경찰은 일반 실종으로 처리했고, 나한테는 사진 한 장이 왔어. Bella가 모르는 방에 앉아 있는. 그날부터 나는 자유로운 인간이 아니야."

    수민: "왜 나한테 이 얘기를 지금?" 엘레나가 담배를 끄고 수민을 바라본다. 눈이 젖어있다. "왜냐면... 내가 다시 끝날 수도 있으니까." 침묵. 바람 소리. "수민, 이 아이들 봐." 엘레나가 핸드폰을 꺼내 사진을 보여준다. 아들 세 명, 딸 하나. 학교에서 웃고 있는 사진. "이 아이들이 커서 엄마가 뭘 했는지 알면 어떡하지? 카르텔의 돈으로 학교에 다녔다는 걸 알면? 엄마가 증거를 조작하고 데이터를 삭제하는 일을 했다는 걸 알면?" 엘레나의 손이 떨린다. "그래서 USB를 줬어. 적어도... 누군가는 진실을 알아야 하니까."

    수민이 엘레나의 손을 잡는다. 차갑고 축축하다. "살아서 나가자. 둘 다." 엘레나가 고개를 끄덕인다. 하지만 그녀의 눈빛은 이미 무언가를 포기한 사람의 눈빛이다.

    [모레노 교수의 강제 실행 — 같은 시각, 지하 B-Level 격리실]

    모레노 교수가 키보드 앞에 앉아 있다. 손이 멈춰있다. 화면에는 자신의 알고리즘—PARAFT v2.1의 최종 컴파일 명령이 깜빡이고 있다. 뒤에서 카르텔 요원이 서 있다. "실행하세요, 교수님." 모레노의 이마에 땀이 맺힌다. "이걸 실행하면 내 연구가 무기가 된다." 요원이 태블릿을 보여준다. 화면에는 모레노의 제자들이 격리된 방에 앉아있는 CCTV 영상. "학생들은 안전합니다. 지금은요." 모레노의 손이 떨린다. 키보드 위에서 0.5초 멈춘다. 그리고 Enter를 누른다. 학생들을 위해서. 화면: "Algorithm validation begins (signature: Moreno_L_t_module_v4.2)". 18:09 UTC, 실시간 선형 보정 모듈 실행. 모레노가 의자에 기대며 눈을 감는다. "미안하다, 수민아."

    [엘레나의 죽음 — 2043-03-19 23:40, 수민의 직접 목격]

    모레노 교수 납치 이후 QuantumFront 내부는 불안과 의심으로 술렁인다. 엘레나와 수민은 몰래 정보를 수집해왔지만, 그중 일부가 새어 나간 정황이 보여 엘 파트론은 내부에 배신자가 있다고 의심한다.

    2043-03-19 23시 40분, 보스턴 항만 자유무역지구 지하 연구실 B-Level(-4층)에 긴급 경보가 울린다. LVOC 시스템이 '비정상 접근'을 감지했다는 신호. 엘레나가 외부 채널로 신호를 보내려던 것 같았다. 락다운이 걸린다. 12개 격벽이 원격으로 봉인된다. 통신 채널 전부 차단.

    수민은 Corridor-B 연결 통로에 있었다. 격벽이 닫히기 0.3초 전, 수민은 반사적으로 복도 측면 유지보수 통로—폭 60cm, 카메라 사각—로 몸을 밀어넣는다. 격벽이 닫힌다. 수민은 그 좁은 공간에서 숨을 참는다.

    30초 후. 발소리.

    Jonas가 Corridor-B로 들어온다. HK417 소총, suppressor 장착. 그는 수민 쪽을 보지 않는다. 그의 눈은 복도 끝 엘레나에게 고정되어 있다.

    엘레나는 Jonas를 보자마자 멈춘다. 손을 든다. 항복의 제스처가 아니다. 인식의 제스처다.

    엘레나의 목소리가 낮다. 떨리지 않는다.

    "...CIA구나."

    한 마디. 질문이 아니다. 확인이다. 수민은 그 말을 듣는 순간 온몸이 굳는다. CIA. 엘레나가 지금 Jonas를 CIA라고 부르고 있다. 수민의 머릿속에서 무언가가 어긋난다. 하지만 지금 움직이면 죽는다.

    두 사람 사이의 복도에 0.5초의 정적이 흐른다. Jonas의 표정이 변하지 않는다. 하지만 소총을 든 손이 0.3도 낮아진다. 그 미세한 움직임. 수민은 그것을 본다.

    엘레나가 천천히 말한다.

    "벨라 찾아줄 수 있어?"

    Jonas가 시선을 약 1초간 유지한다. 그리고 고개를 한 번—아주 작게—끄덕인다.

    엘레나의 표정이 달라진다. 무언가 무거운 것을 내려놓는 얼굴이다. 그녀는 눈을 감는다.

    총성 한 번. Suppressor가 소리를 삼킨다. 엘레나가 벽을 따라 흘러내린다. 눈은 감긴 채로.

    수민은 유지보수 통로 안에서 입을 막는다. 소리가 나오지 않게. 손이 떨린다. 무릎이 떨린다.

    Jonas는 엘레나에게 다가간다. 목에서 얇은 체인을 푼다. 작은 텅스텐 USB—Failsafe 키. 주머니에 넣는다. 그리고 통신기에 짧게 보고한다. "처리 완료." 발소리가 멀어진다. Jonas는 수민 쪽을 한 번도 돌아보지 않는다.

    수민은 그 자리에서 움직이지 못한다. Jonas가 사라진 후에도 2분이 지나도록.

    수민의 머릿속에 방금 본 것들이 겹쳐진다.
    Jonas. HK417. Suppressor. 엘레나의 마지막 말: "CIA구나."
    Jonas의 고개 끄덕임—Bella를 찾아주겠다는.
    그리고 Jonas가 챙겨간 USB. Failsafe 키.

    수민의 해석은 하나다: Jonas는 카르텔의 집행자다. 엘레나를 처리했고, 키를 회수했다. "CIA구나"는 엘레나가 마지막 순간 잘못 알아본 것—아니면, 무언가 다른 의미였을까? 수민은 지금 그것을 판단할 여유가 없다.

    격벽이 열리는 소리가 들린다. 수민이 유지보수 통로에서 나온다. 엘레나는 눈을 감은 채 복도에 누워있다. 1시간 전 옥상에서 나눈 대화가 수민의 머릿속을 관통한다. "내가 다시 끝날 수도 있으니까." 그녀는 이미 알고 있었다. 알면서도 올라왔다.

    수민의 입에서 독백이 새어나온다. 목소리가 아니라 숨결에 가까운 소리로.

    "기술은 칼이 아니다. 칼은 놓을 수 있다. 이건... 손이다. 내 손에 붙어있다. 뗄 수가 없다."

