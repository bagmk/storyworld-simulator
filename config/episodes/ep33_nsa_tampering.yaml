    # 실제 구조: CIA 2개(Jonas+Greyshore) : 카르텔 2개(ElPatron+Carlos) : 수민 1개.
    # 수민은 ep41에서야 Jonas = CIA임을 알게 되며 실제 구조를 인식한다.
    # 이 시점(ep33)에서 수민의 오해(카르텔 4:수민 1)는 서사 긴장의 핵심이다.

    수민은 자신이 5 대 1의 열세에 놓여 있다고 판단한다. 혼자서는 아무것도 할 수 없다.
    밀러는 POC 지원으로 기술 접근권을 확보하려 했다. 하지만 현장은 그렇게 돌아가지 않았다. 카르텔이 수민을 확보했고, 밀러는 아무것도 못 했다. 책상 앞에 앉아 계획만 짜는 사람들은 현장의 복잡성을 이해하지 못한다.

    수민은 확실해진다. 정부를 믿을 수 없다. NSA는 수민을 기술 공급자로만 봤다. FBI는 보호해줄 실력이 없다. 카르텔은 혜진을 쥐고 있다. 그렇다면 수민이 할 수 있는 것은 하나다 — 카르텔에게 충분히 가치 있는 무언가를 가져다주고, 그 대가로 혜진을 돌려받는 것. NSA 파이프라인이 그 도구가 될 수 있다.

    수민은 NSA 모듈 코드를 닫는다. 어제 밤 휴게실에서 혜진에게 했던 말—"진짜 말할 수 없어"—이 머릿속에 맴돈다. 하지만 그 순간부터 수민의 판단이 조용히 바뀌기 시작했다는 걸 그는 안다. 지금 이 선택은 NSA를 위한 것도, FBI를 위한 것도 아니다. 나를 지키기 위한 것이다. 혜진을 지키기 위한 것이다.

