  summary: |
    최종 QPU 시연을 18시간 앞두고, 수민은 밀러가 제공한 'quantum-readout-calibration-kit-v3.1.4' 모듈의 커밋 로그를 들여다본다. 작성자: LST_automation_v2.7. NSA 보안 하청사 자동화 계정이다. 수민은 더 파고든다.

    모듈 안에 숨겨진 서브루틴이 있다. QPU 해독 결과가 나오는 즉시 NSA 서버 풀로 사본을 전송하는 코드다. 타임스탬프도 같이 간다. 수민이 결과를 보기 전에 NSA가 먼저 본다. 이것이 밀러의 설계였다.

    더 깊은 곳에 주석이 있었다. NSA 자동화 계정이 직접 박아 넣은 코드 주석:

    # PRIORITY: NSA_FIRST_READ
    # QPU decode output → pipe to TEMPEST-1 before local display
    # Cartel feed = sanitized version (keys stripped, metadata only)
    # Objective: US Govt secures first 1,000 RSA keys before commercial delivery
    # Control the feed, control the outcome.

    수민은 멈춘다. NSA의 목표는 처음부터 명확했다. QPU로 RSA 키를 발급받는 것. 벤의 회사는 그 실행을 위한 합법적 포장지. QuantumFront는 기술 공급자. 수민은 그 구조의 맨 아래였다. 엘레나가 말했던 것처럼. "넌 그 사이의 칩이야."

    ---

    하지만 수민의 생각이 멈추지 않는다.

    NSA가 이 채널을 쓴다. 벤의 회사를 통해서. QPU 결과를 NSA로 보내는 파이프라인이 이미 깔려 있다는 뜻이다.

    만약 그 파이프라인으로 가는 데이터를 수민이 바꿔치기한다면?

    NSA는 POC가 성공한 줄 안다. 벤의 회사는 정상 작동하는 줄 안다. 그런데 실제로 뚫린 건 NSA가 원하는 RSA 키가 아니라 — 다른 무언가다.

    수민은 ep31 밤에 메모해뒀던 씨앗을 다시 꺼낸다. "이 채널을 역으로 쓸 수 있다면?" 이제 그 씨앗이 형태를 갖추기 시작한다. 구체적인 목표가 필요하다. 카르텔이 원하는 것. 카르텔에게 가져다줄 수 있는 것. 그리고 카르텔이 수민에게 혜진을 돌려줄 이유가 될 것.

    ---

    Miller의 계획은 결과적으로 실패했다.

    Failsafe 키 분배에서 NSA는 완전히 배제되었다. 수민의 현재 인식 (ep33 시점):
    - Cartel: 4개 (Jonas + El Patrón + Carlos + 엘레나의 키를 Jonas가 회수)
    - 수민: 1개
    - NSA: 0개

