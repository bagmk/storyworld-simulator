    시연 당일, 오전 6시. FBI 소피아 스콜튼이 QuantumFront HQ로 찾아온다. 정식 출입 절차. 단독 면담 요청. "수민, 나는 밀러하고 달라요. 나는 당신을 협박하러 온 게 아니에요." 소피아의 어조는 낮고 단호하다. "하지만 당신이 알고 있는 것을 법정에서 말해준다면 — 모레노 교수에 대해 아는 것, 카르텔이 그에게 어떤 압박을 가했는지 — 나는 당신에게 완전한 면책권을 줄 수 있어요. 연방 검사가 서명한 것. 모든 형사 책임 면제. 그리고 증인 보호 프로그램." 소피아가 내미는 것은 서류 한 장이다. Immunity Agreement — DOJ 인장.

    수민은 그 서류를 받는다. 읽는다. 진짜다. 하지만 수민이 말하려는 것은 모레노의 증언이 아니라, 모레노의 목숨이다. 소피아가 모르는 것을 수민은 안다 — 모레노는 지금 지하 연구실에 있다. QPU 시운전이 오늘 오후에 시작된다. 그 시운전을 완료하지 않으면 카르텔이 혜진을 건드린다. 완료하면 모레노가 위험하다.

    수민은 대답하지 않는다. 소피아가 떠난다.

    동시에 라파엘(엘 파트론)의 목소리가 수민의 흑색 휴대폰으로 울린다. "Sumin, let me be clear. If you hide the Professor, you become my enemy. And enemies are expensive. Your sister in Seoul, your mother's clinic—아직도 그대로 있네요. Beautiful building. I wonder how it would fare in an electrical fire." 협박이다. 분명한 협박.

    오후 2시, QPU 최종 시운전이 시작된다. 모레노 교수는 지하에서 극한의 계산 부하(1,600 TFLOPS)를 지휘해야 한다. 노인의 몸으로. 18시간을 꼬박 일해온 그 몸으로.

    한 시간 후, 모레노 교수가 비명을 지른다. "안 돼... 계산이... 너무 많아..." 심박이 140을 넘는다. 혈중 산소 포화도가 85%로 떨어진다. 뇌파에 이상 신호가 나타난다. "누군가... 멈춰줘..." 그의 목소리는 약해진다.

    수민은 모니터를 본다. 중단 버튼이 있다. 하지만 누르면 혜진이 위험해진다. 수민의 손가락은 키보드 위에 올라가지 않는다.

