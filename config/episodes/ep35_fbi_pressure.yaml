    시연 당일, 오전 6시. 밀러가 나타난다. "수민, 우리가 도움을 드릴 수 있는 방법이 있어. 모레노 교수가 어디 있는지 말해 줄래? 그리고 그의 모든 연구 자료를." 그의 손에는 문서가 들려 있다. EB-2 NIW 특별 귀화, 법적 면책권(Immunity Agreement), "모든 형사 책임 면제" 각인. "너는 이미 점 UCSA(Cooperating Suspect)로 등록되어 있어. 나머지는 우리가 정리할 테니까. 모레노 교수만 건네줘. 그럼 넌 자유야."

    동시에 라파엘(엘 파트론)의 목소리가 수민의 흑색 휴대폰으로 울린다. "Sumin, let me be clear. If you hide the Professor, you become my enemy. And enemies are expensive. Your sister in Seoul, your mother's clinic—아직도 그대로 있네요. Beautiful building. I wonder how it would fare in an electrical fire." 협박이다. 분명한 협박.

    수민은 그사이에 갇혔다. 양쪽 모두 자신의 말을 기다린다. 밀러는 보호를 약속하고, 라파엘은 위협한다. 모레노 교수는 여전히 지하 연구실에 있다. 알고리즘은 95% 완성되었다. QPU는 준비됐다. 그리고 시간은 남지 않았다.

    수민은 대답하지 않는다. 밀러가 떠난다. 그리고 오후 2시, QPU 최종 시운전이 시작된다. 모레노 교수는 지하에서 부강한 계산 부하(1,600 TFLOPS)를 지휘해야 한다. 노인의 몸으로. 18시간을 꼬박 일해온 그 몸으로.

