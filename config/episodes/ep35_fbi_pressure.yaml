    알고리즘은 완성되었다. 모레노 교수는 살아있지만 의식이 없다.

    [혜진 영상통화 협박 — 2043-03-26T23:15]

    알고리즘 완성 메시지가 화면을 채우고 23분이 지났다. 수민의 보조 태블릿이 진동한다. 영상통화 수신. 발신 번호: 서울 +82-2-XXX-XXXX. 화면에 얼굴이 뜬다—혜진. 학교 연구실에 앉아있다. 평온한 표정이다. 아무것도 모르는 사람의 표정이다.

    혜진: "오빠? 갑자기 왜—무슨 일이야? 얼굴이 왜 그래?"

    수민이 입을 열려는 순간, 오른쪽 귀에 꽂힌 무선 이어폰이 진동한다. LST 채널이다. 목소리는 낮고 건조하다. 한국어 억양 없는 영어.

    [이어폰 — LST 요원, 수민에게만 들림]:
    "Don't say anything unusual. Just talk to her. We're watching."

    수민의 시선이 화면의 혜진에게 고정된다. 혜진 뒤쪽, 연구실 창가 근처. 서 있는 사람. 남성. LST 복장. 혜진은 모른다. 혜진은 그 사람을 보지 않는다.

    [이어폰]:
    "학교 근처 카페 자주 가시는 것 같던데. 이화여대 정문 앞 Café Alma. 매주 화요일 오전 10시. 맞죠?"

    수민이 손을 쥔다. 화면 너머 혜진은 여전히 웃고 있다. "오빠? 왜 말을 안 해? 어디 아파?"

    수민: "아니, 그냥... 보고 싶어서. 잘 지내지?"

    혜진: "응, 나야 뭐. 다음 달에 논문 심사 있거든. 오빠는 언제 와?"

    [이어폰]:
    "현명한 대답 잘 했어요. 이제 우리가 원하는 건 하나야. 72시간 안에 Phase-Guard 소스코드 전체를 우리가 지정하는 외부 서버로 전송해. 요청을 무시하면—우린 다시 연락할 거야. 화요일 오전 10시에."

    연결이 끊긴다. 혜진은 여전히 화면에 있다. 웃으면서. "오빠, 진짜 왜 그래? 무슨 일 생긴 거야?"

    수민은 대답한다. 목소리는 정상이다. "아무것도 아니야. 정말 보고 싶어서 걸었어. 논문 잘 써."

    통화가 끊긴다.

