    수민은 모니터를 보면서 알 수 있다. 이게 아무도 멈추지 않으면 끝이 난다는 것을. 모레노 교수는 죽을 거다. 그리고 그건 자신의 선택이다. 밀러에게 항복하거나, 라파엘에게 항복하거나. 어느 쪽이든, 모레노는 죽는다.

