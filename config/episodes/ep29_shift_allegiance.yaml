    그로부터 2시간 후, FBI 소피아 스콜튼(Sophia Scholten)에게서 전화가 온다. 목소리는 긴박하다. "수민, 모레노 교수의 연구실 전체가 사라졌습니다. 직원들 전부요. 8명. 아무도 출근 안 하고, 집에도 없고. 이건 납치입니다. 조직적인." 수민의 심장이 내려앉는다. 소피아가 계속한다. "당신도 위험합니다. 지금 어디 계세요? 즉시 안전한 곳으로 이동하세요. 우리가 보호 조치를 취하겠습니다."

    하지만 수민은 안다. FBI의 '보호'가 얼마나 공허한 약속인지. 엘레나도 보호받는다고 했지만 결국 죽었다. 소피아의 경고는 진심이지만, 그녀의 힘으로는 아무것도 막을 수 없다. 수민은 전화를 끊는다. "괜찮습니다. 제가 알아서 할게요."

