    수민은 지하 통제실 한쪽 벽에 등을 대고 서 있다. 라파엘의 허가로 이 자리에 있다. "당신이 설계한 시스템이니, 당신이 지켜봐야지." 그 말이 허락이었는지 감시였는지 모른다.

    El Patrón이 Carlos에게 지시한다. "Failsafe 키를 삽입해. 3개면 된다."

    Carlos가 USB 슬롯에 키를 삽입한다:
    - Slot 1: El Patrón's key ✓
    - Slot 2: Carlos's key ✓
    - Slot 3: Greyshore key (FBI 압수 후 복구한 복제본)

    [ERROR]
    화면에 붉은 경고:
    "Shamir Secret Sharing verification failed.
     2 of 5 keys authenticated.
     Key #3: INVALID (forensic copy detected - cryptographic signature mismatch)
     Require 1 additional ORIGINAL key for activation."

    El Patrón의 얼굴이 굳는다. "복제 키를 감지했어?"

    Carlos: "Elena의 키가 있습니다. Jonas가 회수했다고 보고했습니다."

    El Patrón: "그럼 그걸 써!"

    [30분 후]
    Jonas를 찾았지만... USB가 없다.

    El Patrón (Jonas에게): "키는 어디 있어?!"

    Jonas (차분하게): "금고에 넣었습니다."

    금고를 연다. 비어있다.

    El Patrón: "누가 가져갔어?!"

    Jonas: "모르겠습니다."

    방 안에 침묵이 흐른다. 수민은 그 침묵의 질감을 느낀다. Jonas는 당황하지 않는다. 너무 차분하다. ep29 밤에 모니터링 콘솔에서 읽었던 평문 단편이 머릿속에서 소환된다. "BURKE-7: As long as it takes, Jonas. That's the job."

    El Patrón도 같은 것을 느꼈는지, 목소리가 낮아진다.

    "Elena의 키가... CIA로 넘어간 거야?"

    Jonas는 대답하지 않는다.

    El Patrón: "너... CIA 스파이였어?"

    Jonas (차분하게): "저를 쏘시면, CIA가 즉시 알고리즘을 전세계에 공개합니다. 암호화폐 시장 붕괴. 당신의 Greyshore 자산... 전부 무용지물이 됩니다."

    El Patrón의 손이 떨린다.

    "...협박하는 거야?"

    Jonas: "아뇨. 사실을 말씀드리는 겁니다."

    수민은 등을 벽에서 뗀다. 머릿속으로 빠르게 계산한다.
    카르텔: 2개 (El Patrón + Carlos). CIA: 2개 (Greyshore 원본 + Elena 키). 수민: 1개.
    Shamir 3-of-5. 어느 쪽도 단독으로 3개를 확보할 수 없다.

    두 세력이 서로를 겨누고 있다. 그리고 수민의 키 하나가 그 균형의 추를 결정한다.

    수민이 입을 연다.

    "잠깐요."

    두 사람이 수민을 본다.

    "둘 다 들으세요. 저 없이는 어차피 못 열어요. 어느 쪽이 3개를 쥐든, 72시간마다 제 패스프레이즈가 필요합니다. 저를 죽이면 Deadman switch가 발동되고 알고리즘이 전세계에 공개됩니다. 이제 선택하세요. 싸우다 같이 망하거나, 협력하거나."

