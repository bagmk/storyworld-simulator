episode:
  id: ep01_conference_shadow
  date: 2041-05-21T10:00
  location: International conference venue — main auditorium, sponsor lounge, corridors
  summary: 제네바 컨퍼런스 센터에서 모레노 교수의 초전도 큐비트 획기적 성과 발표가 열렸다. 발표 도중 제복의 군인과 검은 정장의 요원 등
    감시 성격의 인물들이 포착되고, 휴게실과 복도 대화에서 모레노는 수민에게 실시간 보상·지원의 필요성을 촉구한다. 이후 Miller라는 남성이
    NSA 연계 제안(비공식적 자금 지원과 조건)을 조심스럽게 건네며 분위기는 학술에서 안보·압박으로 급격히 바뀐다.
  introduced_clues:
  - id: clue_ep01_academic_presentation_c01
    content: '모레노 교수의 슬라이드 첫 장면: 《Quantum Coherence Scaling: T₂ → T₂ × 3.7 (초전도 큐비트)》.
      3.7배 향상이라는 수치는 학계 표준보다 획기적이다. 더 충격적인 건 다음 슬라이드. "기존 방식으로는 위상 드리프트에서 50ms 이상
      손실이 발생합니다. 하지만 보상 회로를 초전도 링에 내장하면..." 무대 조명 아래서 모레노의 발음이 명확해진다. 이건 단순한 학술 발표가
      아니었다. 기존 인류의 한계를 명시하고, 그것을 깨뜨리는 방법을 공개하는 것.

      '
    trigger: agent cross-checks telemetry/logs or inspects code paths during the scene
    inject_threshold: 0.45
    inject_method: system_alert
  - id: clue_ep01_academic_presentation_c02
    content: '제복 안경의 육군 대령과 검은 정장 여성. NSA 표장이 없어도 그들의 자세, 펜을 잡는 방식, 메모지의 글씨 크기—모두
      공무원 훈련의 결과물이었다. 더 명확한 신호는 눈 마주침. 모레노가 핵심 기술을 언급하는 순간, 대장의 펜이 멈추고 옆 사람과 눈을 맞춘다.
      그 순간은 0.3초였지만, 수민의 뇌에는 "이들이 기술에 관심이 있다"는 게 아니라 "이들이 뭔가를 확인하고 있다"는 신호로 박혔다.

      '
    trigger: a small environmental detail catches the protagonist's attention
    inject_threshold: 0.5
    inject_method: environmental_cue
  - id: clue_ep01_academic_presentation_c03
    content: '제복 남자의 메모장. 비장한 그림이 아니라 실제 메모. 수민은 각도상 읽을 순 없었지만, 제목처럼 보이는 대문자들을 포착했다.
      "COHERENCE", "DRIFT", 그리고 아래쪽에 원형으로 표시된 숫자들. 십자 표기법은 대학원 노트에서는 없는 방식이었다. 그건
      업무 보고 형식이었다. 학생이 하는 필기가 아니라, 상급자에게 보고할 내용을 정리하는 방식.

      '
    trigger: protagonist handles a document, portal page, or printed artifact related
      to the scene
    inject_threshold: 0.55
    inject_method: document_artifact
  - id: clue_ep01_academic_presentation_c04
    content: '쉬는 시간. 복도. 모레노와 수민의 대화. 모레노: "아, 수민. MIT 때 본 그 논문 맞나? QEC 논문." 하지만 모레노의
      눈은 수민이 아니라 뒤쪽 출구 방향을 향하고 있었다. 거기서 제복 발걸음이 멀어지고 있었다. 모레노가 다시 수민 쪽으로 시선을 돌렸지만,
      그 움직임은 배우의 리셋 같았다. "네 다음 스텝은 뭐야?" 질문이 빠르고 뾰족했다. 이전의 따뜻한 멘토 톤이 아니었다. 이건 무언가를
      재빨리 물어야 한다는 절박함이었다.

      '
    trigger: an NPC raises the point in conversation or asks a leading question
    inject_threshold: 0.6
    inject_method: npc_question
  - id: clue_ep01_academic_presentation_c05
    content: '모레노의 마지막 조언: "보상 회로 아이디어, 좋은 거야. 근데 위상 드리프트를 완벽히 제거하려면 단순 회로론 부족해. 초전도
      링의 온도 변화까지 예측해야 한다. 그걸 실시간으로 조정할 수 있으면... 그건 뭔가 독보적인 거가 된다." 말을 끝내며 모레노는 수민
      어깨에 손을 얹었다. 하지만 손의 압력이 따뜻하지 않았다. 마치 누군가를 밀어내는 제스처처럼 느껴졌다. "그런데 그런 걸 혼자 하려면 말이야...
      지원이 필요해. 알겠지?"

      '
    trigger: an NPC raises the point in conversation or asks a leading question
    inject_threshold: 0.65
    inject_method: npc_question
  resolved: []
  recommended_length: 3200
  pacing: tense
  max_turns: 28
