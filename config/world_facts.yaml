# world_facts.yaml
# Defines three categories of facts for the story world.
# The Director AI knows all facts. Agents only access public + discovered clues.

world_facts:

  # ── Hidden facts ──────────────────────────────────────────────────────
  # Known ONLY to the Director AI. Agents must NOT reveal these.
  # These define the ground truth the story is building toward.
  hidden:
    - content: |
        QuantumFront was ORIGINALLY created as a tech–finance front by El Patrón
        (Raphael) and Carlos purely for accounting fraud—inflating valuations of
        "quantum R&D" to launder cartel money through fabricated tech investments.
        The public campus at Seaview Research Park exists for PR, hiring, and
        audit-facing compliance theater. The cartel had NO intention of actually
        building quantum capability; "Quantum" was just a buzzword to justify cash flows.

        TURNING POINT: When Sumin secured NSA funding (Miller's $2M/year offer),
        El Patrón initially STRONGLY OPPOSED it—outside attention threatened their
        laundering operation. But as Sumin's research showed genuine RSA-breaking
        potential, El Patrón's strategic mind recognized a far greater opportunity:
        the technology itself could become an instrument of power worth more than
        any laundering scheme. The cartel pivoted from "fake quantum for money
        laundering" to "real quantum as geopolitical weapon."

        This pivot was accelerated by the fact that the Boston Harbor Free Zone already
        housed the cartel's security/logistics team (LST) for processing and
        blocking illegal operations at the port. The existing LST infrastructure +
        quantum computing potential created a synergy the cartel couldn't ignore.

        The real program now runs inside a Boston Harbor Free Zone underground site
        (harbor_underground_lab). The underground operation evolved from pure
        laundering to: (1) targeted key recovery/exfiltration using hybrid quantum,
        (2) leveraging quantum capability for geopolitical negotiation power, and
        (3) building a permanent "mutual assured dependence" structure with state actors.

    - content: |
        The capability is not “a quantum computer that cleanly breaks RSA-2048.”
        The pipeline is hybrid:
        (A) LST-derived access to HSM test keys / partial key material / routing
            disruption reduces the remaining entropy,
        (B) Moreno’s real-time phase-tracking plus Phase-Guard stabilization enables
            the QPU to recover specific classes of keys on minute-scale timelines.
        The real power is targeted key recovery/exfiltration, not a generalized Q-Day.

    - content: |
        The NSA (Miller line) is not prioritizing “taking down the cartel.”
        Their objectives are:
        (1) force early access to selected keys/channels to secure national-security advantage,
        (2) if needed, desynchronize FBI timing and procedure,
        (3) then seal the matter under “national security” to control disclosure.
        The cartel backchannel is not “hostile coexistence” but a constrained,
        mutually beneficial transaction that remains deniable.

    - content: |
        Yonas Mehret is a long-term CIA deep-cover asset placed INSIDE the cartel—not
        a cartel member who crossed to the CIA. The CIA embedded him in the cartel's
        Boston Harbor Free Zone operations approximately 8 years before the story begins,
        with a fabricated identity and an intentionally incomplete legal/travel record.
        His cover role is Freeport floor supervisor; his actual role is a physical–digital
        bridge for CIA intelligence collection on cartel LST/SCADA operations.

        ELENA'S DEATH (EP28): When cartel enforcement teams surrounded the building and
        Elena's elimination became unavoidable, Yonas made a unilateral operational
        decision: by personally executing Elena, he (1) preserved his deep-cover status
        within the cartel—proving absolute loyalty, (2) protected Sumin's position and
        intelligence value from being exposed, and (3) controlled the manner of death to
        minimize Elena's suffering. This was not ordered by the CIA—it was Yonas's own
        judgment call, which will haunt him permanently.

        THE BELLA PROMISE: In Elena's final moment, she recognized Yonas as CIA-affiliated
        (from her Zetanet-era exposure to CIA contact protocols). She asked only one thing:
        "Can you find Bella?" Yonas nodded. He has honored this—Bella (Elena's younger
        sister, disappeared 2028) was located in a CIA-adjacent protective arrangement.
        Yonas telling Sumin "Bella is fine" in EP41 is not absolution—it is the only act
        of accountability he can offer for what his hands did.

        The "last ten minutes" around Elena's shooting—lockdown sequence, CCTV gap, and
        corridor routing—was engineered by Yonas to ensure no one else could intervene
        and to give Elena's death the appearance of a clean cartel operation.

    - content: |
        Before her death, Elena partially implemented a deadman architecture that can
        auto-release CryoLab logs and evidence externally. One release condition
        (time / NTP drift / key threshold) was deliberately sabotaged so the material
        does not spill immediately. The broken deadman becomes later leverage in
        bargaining and coercion.

    - content: |
        Moreno’s death is a near-assassination staged to look like accidental overwork.
        Medical access was constrained, RF noise and nitrogen-steam stressors were used,
        and lockdown pressure was applied to prevent a safe stop. The psychological threat
        “If you halt, your family pays” removed voluntary termination as an option.
        The final narrative is pre-framed so that Sumin’s non-stop run becomes a
        moral/legal stain—complicity by design.

    - content: |
        The Mock Q-Day (EP30) is a cartel DISINFORMATION operation: using conventional
        hacking (leaked HSM test keys, BGP/DNS manipulation, botnet amplification) to
        create the ILLUSION that quantum computing has already broken RSA, without
        actually using the quantum computer. The purpose is to generate panic (financial
        markets, government response) and use that panic as negotiation leverage BEFORE
        the real QPU demo. The cartel controls both "rails": the Narrative Rail (fake
        fear) and the Quantum Rail (real technology), and synchronizes them with a
        precisely calculated 17-second phase offset.

    - content: |
        The three U.S. intelligence agencies are in ACTIVE CONFLICT with each other:
        - FBI (Sophia): Prioritizes legal prosecution, evidence chains, grand jury.
          Limited by procedure. Wants to dismantle the cartel through courts.
        - NSA (Miller): Prioritizes technology acquisition and national-security
          monopoly. Willing to work WITH the cartel via backchannel if it means
          controlling the quantum pipeline. Actively undermines FBI timing.
        - CIA (Ethan): Prioritizes geopolitical balance and cross-border finance.
          Uses Yonas as a double agent inside the cartel. Seeks to prevent ANY
          single faction (including NSA) from monopolizing the technology.
        This inter-agency conflict is as dangerous to Sumin as the cartel itself.

    - content: |
        Sumin's Failsafe-B system embodies THREE levels of balance simultaneously:
        (1) POLITICAL balance: cartel vs. government—no single faction can monopolize
            the quantum capability without the others' cooperation (3-of-5 key sharing).
        (2) TECHNICAL balance: the 72-hour re-authentication + deadman switch ensures
            no one can eliminate Sumin without triggering mutual destruction.
        (3) PHILOSOPHICAL balance: Sumin's evolving understanding that "technology is
            a hand, not a knife"—the same system that can break RSA can also prevent
            its misuse, depending on who controls it and how.
        The Failsafe is simultaneously Sumin's prison and his only protection.

  # ── Discoverable facts ────────────────────────────────────────────────
  # Agents CAN learn these through appropriate actions/dialogue.
  # The ClueManager tracks which agents have discovered each fact.
  discoverable:
    - id: "clue_phaseguard_flags"
      content: "CryoLab syslog repeats `FLAG_FAILSAFE` / `phase.lock` / `Phase-Guard` events, implying an automated sealing routine fired under specific conditions."
      trigger: "agent reviews CryoLab system logs or experiment run logs"

    - id: "clue_bridge_slot_reference"
      content: "Hardware manuals / internal wiki label `BRIDGE_SLOT` as a physical injection port (an authorization trigger), and counters show it was used within the last two weeks."
      trigger: "agent inspects hardware docs, maintenance counters, or rack-level telemetry"

    - id: "clue_znt_variable"
      content: "Elena’s codebase contains recurring `ZNT_*` variables; comments/commit phrasing match the naming conventions of her past hacker crew, 'Zetanet.'"
      trigger: "agent searches the codebase / git history for unusual variables or tags"

    - id: "clue_procurement_mismatch"
      content: "A PO–Invoice–B/L bundle shows subtle mismatches (unit price/quantity/weight). Payment memos repeat neutral terms like 'service credit', 'retrofit', 'consulting', 'spare', and 'license.'"
      trigger: "agent audits procurement ERP, invoice scans, or shipping documents"

    - id: "clue_greyshore_secondary_escrow"
      content: "Contract / escrow packets include 'Secondary escrow: Greyshore Capital LLC' and cluster near a patent assignment executed under a Mexican foundation’s name."
      trigger: "agent reviews contract PDFs, escrow packets, or patent transfer paperwork"

    - id: "clue_siem_timestamp_reorder"
      content: "SIEM/audit logs show timestamp re-ordering artifacts and a discarded module prefix (a 'ghost header')—a pattern consistent with log grooming rather than normal automation."
      trigger: "agent inspects SIEM dashboards or raw audit logs"

    - id: "clue_freeport_gate_deactivated_badge"
      content: "Boston Harbor Free Zone gate/elevator logs show a pre-dawn ride (e.g., 03:xx) to Level D using a deactivated staff ID; the linked CCTV has a 60-second gap."
      trigger: "agent checks Freeport access control logs or requests CCTV extracts"

    - id: "clue_plc_valve_17_blink"
      content: "Just before a port incident window, an LST/SCADA alert for `PLC_Valve_17` appears briefly and then clears. The incident bulletin read-receipt shows an unknown account starting with 'Y.'"
      trigger: "agent correlates incident timeline with SCADA alarms and notification read-receipts"

    - id: "clue_family_watch_tab"
      content: "A console screenshot reveals a hidden `Family/Watch` tab monitoring a target’s location and communications—evidence of coercion infrastructure."
      trigger: "agent reviews Elena-provided USB, screenshots, or internal console exports"

    - id: "clue_nsa_injected_delay_rail"
      content: "Measurement-chain/deployment scripts contain a 'audit/delay rail' hook; a comment shows initials `Y.M – field`. Commit signatures point to an NSA subcontractor account."
      trigger: "agent diffs deployment scripts, examines measurement chain configs, or reviews commit signatures"

    - id: "clue_miller_name_misspelling"
      content: "Across emails/tickets/signatures, Miller’s name alternates between `Christan` and `Christian`, suggesting multiple identities (official/unofficial) or intentional obfuscation."
      trigger: "agent reviews internal emails, ticketing records, or NDA/briefing docs"

    - id: "clue_line_delta_private"
      content: "Meeting-room console logs show a `Line-Delta / Private` session tag; the audio waveform contains two repeated 3-second silences (consistent with Raphael’s signature habit)."
      trigger: "agent inspects meeting room console playback logs or audio artifacts"

    - id: "clue_failsafe_b_spec"
      content: "A Failsafe-B spec lists `B-Threshold(3/5)` + `TimeLock` + `Deadman Switch` + `NTP drift` conditions; a deliberate misspelling `Time-Lock` appears in one printout section."
      trigger: "agent obtains the Failsafe-B spec printout or accesses the secure design folder"

    - id: "clue_moreno_firmware_watermark"
      content: "QPU control firmware contains a watermark/signature pattern from Moreno’s lab, implying forced integration rather than voluntary collaboration."
      trigger: "agent analyzes firmware binaries or compares build artifacts against known Moreno signatures"

    - id: "clue_two_rails_sync"
      content: "CryoLab dashboards/runbooks include notes like `rails.phase_offset = 00:17s` and a cue sheet that synchronizes the narrative rail (fear amplification) with the quantum rail (the actual demo)."
      trigger: "agent reviews ops runbooks, dashboard snapshots, or botnet/social cue sheets"

    - id: "clue_airport_cctv_no_immigration"
      content: "Airport CCTV captures Carlos (or a near-match), but immigration/entry databases show no corresponding record for that window—someone can appear on camera yet vanish from official logs."
      trigger: "agent cross-checks CCTV stills with immigration/entry logs"

    - id: "clue_backchannel_phrase"
      content: "Intercepted notes repeat a phrase like 'the freezing hand, the unfreezing hand'; Greyshore freeze/unfreeze actions and export-control signals move with the same header style."
      trigger: "agent correlates intercepted comms, fax headers, and financial freeze notices"

    - id: "clue_cartel_original_purpose"
      content: "Early QuantumFront financial records show zero actual R&D expenditure for the first 18 months—all 'quantum research' line items were redirected to Greyshore-linked accounts. The company was a pure valuation-inflation vehicle before Sumin's arrival."
      trigger: "agent audits historical financial records or founding documents of QuantumFront"

    - id: "clue_patron_opposition_to_nsa"
      content: "Intercepted voice memo from El Patrón (pre-pivot era): 'NSA 자금을 받는다고? 미쳤어. 우리한테 감사가 들어오면 끝이야. 당장 끊어.' This shows the cartel initially tried to BLOCK NSA involvement before recognizing the technology's true potential."
      trigger: "agent reviews intercepted cartel communications from early timeline"

    - id: "clue_mock_qday_mechanics"
      content: "The 'Q-Day breakthrough' reported on March 22 used only 2 leaked HSM test keys (marked 'TEST - DO NOT USE') combined with BGP hijacking and a 500K-node botnet for social amplification. No actual quantum computation was involved in the public-facing demonstration."
      trigger: "agent analyzes the technical evidence behind the Q-Day news reports"

  # ── Public facts ─────────────────────────────────────────────────────
  # All agents are aware of these from the start.
  public:
    - "The year is 2043. Quantum computing has advanced, but remains fragile—extremely sensitive to cryogenics, vibration, EMI, and measurement-chain latency."
    - "QuantumFront maintains a public campus at Seaview Research Park and presents itself as a private R&D organization working on 'next-generation quantum/security.'"
    - "Boston Harbor Free Zone is a fictional U.S. port free-zone rumored to have looser logistics, customs, and audit boundaries."
    - "Some QuantumFront equipment, cryogenic components, and large racks move through Freeport logistics for 'offsite integration testing.'"
    - "Greyshore Capital repeatedly appears around QuantumFront as an investment/escrow partner, but its true structure is opaque."
    - "Key figures include: Kim Sumin (quantum physicist, MIT-trained), Elena Ramirez (technical lead, former Zetanet hacker), Dr. Alex Moreno (MIT professor, phase-tracking authority, Sumin's doctoral advisor), Yonas Mehret (Boston Harbor Freeport floor supervisor), and Carlos Reyes (operations/pressure specialist)."
    - "Terms like 'Phase-Guard', 'Failsafe', and 'BRIDGE_SLOT' circulate internally, but official documentation is selectively shared."
    - "Institutional incentives differ: the FBI prioritizes procedure/evidence/prosecution, the CIA prioritizes external balance/deals, the NSA prioritizes national-security advantage, and the port floor prioritizes keeping operations running."
    - "[WORLD 2043] In 2038, the U.S.–China Digital Separation Accord (DSA-38) formalized 'Splinternet' zones—separate internet routing, certificate authorities, and encryption standards for each bloc. Legacy RSA-2048 remains dominant in the U.S. zone; quantum-resistant PQC adoption is at only 23% as of 2043."
    - "[WORLD 2043] NIST issued a formal '5-year RSA threat horizon' advisory in 2041, acknowledging that nation-state quantum programs may achieve RSA-2048 breaks within the decade. Publicly known but widely dismissed as theoretical—QuantumFront's actual progress makes it imminent."
    - "[WORLD 2043] The Korea–U.S. Joint Research Visa Treaty (KJRVT, 2039) created fast-track dual-status research permits for STEM professionals. However, quantum/AI specializations require an additional NSA security clearance layer—making Korean researchers like Sumin legally vulnerable to simultaneous U.S. and Korean oversight."
    - "[WORLD 2043] Boston Harbor Free Zone's population has grown 340% since 2035, driven by climate displacement and post-DSA logistics boom. The legal gray zone between federal jurisdiction, port authority rules, and free-zone charter creates enforcement gaps that organizations like the cartel exploit systematically."
    - "[WORLD 2043] NSA's HyperConnect QI program (2040–present) is building quantum-communication interception infrastructure in parallel with classical SIGINT. Miller's division is its operational arm. Budget classified; existence is not."
    - "[WORLD 2043] Biometric + quantum-OTP two-factor authentication became the U.S. financial sector standard in 2041 after the Shanghai Breach. The system is exactly what a functioning quantum computer would render obsolete overnight."
    - "[WORLD 2043] Autonomous port logistics systems handle 61% of Boston Harbor's container throughput. Human operators like Yonas are increasingly rare—and therefore hold disproportionate trust for physical-layer access that cameras and sensors cannot replace."
    - "[WORLD 2043] The 'Certified Information Rail' (CIR) regulatory framework (2042) requires platforms to tag AI-generated content. The cartel's Mock Q-Day exploits the 72-hour CIR grace period before takedown orders can be issued—enough time to move global financial markets."
    - "[WORLD 2043] MIT's Quantum Systems Lab (Moreno's department) was ranked #1 globally in 2040–2042. His Phase-tracking paper (2039, Nature Physics) is the most-cited quantum control paper of the decade—which is exactly why the cartel needed him alive, and why his disappearance will become an international incident."
    - "[WORLD 2043] The 2040 Carbon Shipping Tax Act made conventional long-haul shipping 38% more expensive, accelerating the consolidation of logistics through free-zone hubs like Boston Harbor. This economic shift inadvertently created the legal infrastructure the cartel uses to move equipment and people."
