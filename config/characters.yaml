  - id: "yonas_mehret"
    name: "Yonas Mehret"
    role: "supporting"
    bio: |
      A CIA long-term deep-cover asset embedded inside the cartel's Boston Harbor Free Zone
      operations—not a cartel member who crossed to the CIA, but an operative the CIA placed
      inside the cartel approximately 8 years before the story begins. His cover identity is
      Boston Harbor Freeport floor supervisor; his actual function is a physical–digital bridge
      for CIA intelligence collection on cartel LST/SCADA operations.

      He appears in the story like a shadow: present in access logs, present in corridors,
      present in the feeling of being watched. He speaks in half-truths and questions—never
      enough to convict, always enough to destabilize. His fabricated legal identity and
      intentionally incomplete travel record are CIA-engineered to resist scrutiny from both
      cartel and federal investigators.

      His most consequential act: in EP28, with cartel enforcement teams surrounding the
      building and Elena's elimination unavoidable, Yonas made a unilateral decision to
      personally execute Elena—preserving his deep-cover status, protecting Sumin's position,
      and controlling the manner of death. This was not a CIA order. It was his own judgment
      call, made in seconds, and it will define him permanently.

      In Elena's final moment, she recognized him as CIA-affiliated (Zetanet-era contact
      protocol instinct) and asked only: "벨라 찾아줄 수 있어?" He nodded. He has kept that
      promise—locating Bella and ensuring her safety. His EP41 line "벨라는 잘 있다" is not
      absolution. It is the only form of accountability his hands can offer.
    core_competencies:
      - "Boston Harbor Freeport operations: access surfaces, schedules, physical blind spots"
      - "CIA deep-cover tradecraft: identity maintenance, compartmentalization, social masking"
      - "LST/SCADA systems: translating cartel operational demands into on-the-ground execution"
      - "CCTV manipulation, lockdown engineering, corridor routing for controlled incidents"
    invariants:
      - "Never confirms CIA allegiance to anyone—not cartel, not Sumin, not FBI"
      - "Uses ambiguous phrasing to avoid committing to any single claim"
      - "Will sacrifice individuals (including himself) to preserve operational integrity"
      - "The Bella promise is the one line he will not cross—it is his private moral floor"
    goals:
      - "Maintain CIA intelligence access inside the cartel through the QPU project's conclusion"
      - "Prevent any single faction (NSA, cartel, FBI) from monopolizing the quantum capability"
      - "Honor the Bella promise—the only act of personal ethics he allows himself"
      - "Survive without letting either the cartel or the CIA discover his full duality"
    initial_relationships:
      kim_sumin:             -0.1
      elena_ramirez:          0.3   # Recognized her as a fellow person trapped—even as he killed her
      carlos_reyes:           0.4   # Performs loyalty perfectly; Carlos trusts him
      el_patron:              0.3   # El Patrón suspects everyone; Yonas has survived this longest
      agent_sophia_scholten: -0.3   # FBI is his existential threat to cover
      agent_ethan_burke:      0.6   # Ethan is his handler—the only person who knows the full truth
    tragic_note: |
      요나스의 비극은 단순하다: 그는 엘레나를 죽이지 않아도 될 수 있었다.
      하지만 그렇게 했다. 그리고 그것이 옳은 선택이었는지 그는 영원히 알 수 없다.
      EP41 마지막 장면—수민에게 커피를 가져다주고 "벨라는 잘 있다"라고 말한 후,
      창밖을 바라보며 혼잣말: "나도 언젠가는 잘 있어야 할 텐데."
      이 한 줄이 요나스의 진짜 게임이 무엇인지를 독자에게 남긴다: 생존.

  - id: "ben_clarke"
    name: "Ben Clarke"
    role: "supporting"
    bio: |
      An American physicist and Sumin's long-running rival, first forged in elite academic competition
      at MIT under Dr. Alex Moreno (students in different cohorts, always measured against each other).
      Ben chose the pragmatic arc: government contracts, industry credibility, and a clean narrative
      of success. That pragmatic arc eventually led him to Miller.

      Ben is not Miller's spy. He is Miller's contractor—a physicist who took DARPA funding through
      NSA-adjacent channels and gradually became embedded in Miller's network. He does not consider
      himself compromised; he considers himself realistic. When Moreno disappears, Ben is genuinely
      frightened—he had NO KNOWLEDGE of the kidnapping, which reveals NSA's compartmentalization:
      Miller didn't tell his own contractors. Ben's panic call to Sumin ("교수님 연락이 안 돼, 며칠째")
      is authentic alarm, not performance.

      In EP31, Ben offers Sumin a Miller-backed NSA contract—genuinely believing this is rescue.
      At this moment Sumin discovers the Ben-Miller connection (through the NSA backdoor key
      analysis) and uses the knowledge to reverse the power dynamic: Sumin forces Ben to choose
      between his contract and his integrity, then tears up the offer letter. Ben is not exposed
      publicly—but he knows Sumin has the evidence. This is Sumin's first fully autonomous,
      offensive move in the story.

      Ben's final status: stripped of leverage, aware that Sumin holds proof of his NSA
      entanglement, and facing his own version of the same impossible choice Sumin faced years ago.
      His pragmatic worldview—"outcomes are the only scoreboard"—turns against him.
    core_competencies:
      - "Navigating government/industry/DARPA ecosystems—including NSA-adjacent funding channels"
      - "High-performance physics culture: competition, publishing, positioning"
      - "Recruiting talent through incentives and status (the same tools Miller used on him)"
    invariants:
      - "Treats outcomes (funding, impact, security) as the only real scoreboard"
      - "Competitive drive never turns off—even when he is 'helping'"
      - "Will not risk his own stable path for someone else's moral crusade—until EP31 proves he has no stable path left"
      - "Genuinely did not know about Moreno's kidnapping—Miller compartmentalized him"
    goals:
      - "Pull Sumin into a Miller-backed 'legitimate' NSA pipeline (believing this is rescue)"
      - "Keep his own DARPA/NSA contracts and academic reputation intact"
      - "Prove quietly that his pragmatic choices were correct—but EP31 fractures this"
    initial_relationships:
      kim_sumin:             -0.2
      alex_moreno:            0.55
      agent_christan_miller:  0.45  # Working relationship, contractor level—not full trust
      agent_ethan_burke:      0.0
      elena_ramirez:          0.0
    character_reversal: |
      EP23: 모레노 납치를 모르는 채 수민에게 패닉 전화. "교수님이 사라졌어."
      이 순간 벤은 NSA의 관료주의적 무능의 피해자임이 드러난다—밀러조차 그에게 말하지 않았다.
      EP31: 수민이 NSA 백도어 키를 분석해 벤-밀러 연결을 발견하고 역전시킨다.
      벤이 설계한 함정에 벤이 빠진다. 수민이 처음으로 완전히 능동적으로 움직인 순간.
      결말: 벤은 증거를 가진 수민과 계속 살아가야 한다. 그것이 그의 진짜 감옥이다.

