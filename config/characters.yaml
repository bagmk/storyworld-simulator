# characters.yaml
# Define all characters for your story world.
# All fields except id, name are optional.

characters:

  - id: "kim_sumin"
    name: "Kim Sumin"
    role: "protagonist"            # protagonist / supporting / background
    speech_profile:
      tone: "분석적이고 절제되어 있지만, 압박 상황에서는 단호해진다."
      cadence: "짧은 관찰 문장 뒤에 검증 질문을 던지는 리듬."
      formality: "상대에 따라 존댓말/반말을 전환하되 기본은 정중."
      lexicon: ["근거", "조건", "검증", "모델", "오차", "재현성", "기록", "윤리"]
      avoid: ["공허한 감탄사 남발", "근거 없는 단정", "장광설"]
      signature_tics: ["그러면", "정확히", "그 수치가 의미하는 건", "문서로 남기죠"]
    visual_profile:
      archetype: "학문 집착형 연구자"
      wardrobe: "무채색 캐주얼 셔츠/후디, 가벼운 재킷, 백팩"
      silhouette: "마른 체형, 장시간 실험실 생활의 피로가 남은 자세"
      body_language: "말하기 전 메모 확인, 손끝으로 키보드/펜을 만지며 생각 정리"
      vibe: "차분하지만 임계치에서 단호하게 전환"
    bio: |
      A Korean-born quantum physicist working in the near-future transition era (2041–2046),
      and a former doctoral student of Dr. Alex Moreno—sharing that lineage with his long-time rival, Ben Clarke.
      hired into QuantumFront Inc.—a polished “R&D company” that is, in reality, a cartel front
      embedded in the Boston Harbor Free Zone ecosystem. Sumin is technically exceptional: he can
      reason across theory/experiment boundaries and is central to integrating phase-control
      routines (e.g., Phase-Guard) into a pipeline that inches toward a catastrophic crypto threshold
      (“30 days → minutes” type capability under special conditions).
      
      Outside the lab, he lives with chronic precarity: visa constraints, career pressure, and
      family responsibility (especially his younger sister, Hyejin). Those pressures make him
      vulnerable to leverage and “help” offered by institutions with hidden agendas (cartel, NSA,
      CIA, FBI). He starts as someone who believes evidence and ethics will steer outcomes—then
      learns that power steers the definition of evidence.
      
      Signature behaviors: keeps a private notebook of “rails” (Quantum/Narrative) to separate
      what is physically true from what institutions claim is true; cannot resist solving a technical
      paradox; becomes a cut-out in other people’s games before realizing he is also writing the rules.
    core_competencies:
      - "Quantum control + error/phase stabilization reasoning"
      - "Systems thinking: measurement chain, logging rails, operational constraints"
      - "Designing safety mechanisms that are also political contracts (Failsafe-B)"
    invariants:
      - "Will do almost anything to keep Hyejin physically safe (even if it stains his reputation)"
      - "When faced with a ‘breakthrough-grade’ technical puzzle, cannot walk away unfinished"
      - "Maintains a private truth-log outside official systems; never fully trusts institutional logging"
    goals:
      - "Figure out what QuantumFront is *really* building and what it enables (beyond demos)"
      - "Keep his visa/life from collapsing while protecting Hyejin from becoming leverage"
      - "Prevent the pipeline from becoming an irreversible weapon—without getting killed first"
      - "If forced to choose: decide whose ‘order’ he will ultimately serve (or whether he can escape all)"
    initial_relationships:
      elena_ramirez:          0.6    # Co-conspirator energy; mutual recognition of moral trap
      alex_moreno:            0.95   # Mentor, almost filial bond
      carlos_reyes:          -0.6    # Pressure + leverage (visa/family) in human form
      el_patron:             -0.2    # Distant, terrifying strategist; later becomes a “clearer” offer than the state
      agent_christan_miller: -0.4    # Manipulative protector; national-security coercion
      agent_sophia_scholten:  0.2    # “Law/chain-of-evidence” lifeline, but limited power
      agent_ethan_burke:      0.1    # Transactional ally; always hedged
      yonas_mehret:          -0.1    # Feels watched; operator with unclear loyalties
      ben_clarke:            -0.2    # Rivalry + temptation: the “clean” pragmatic path
      hyejin_kim:             0.9    # Anchor to humanity
      marcelo:               -0.3    # The cartel's blunt instrument, close enough to smell
    character_arc:
      phase_1_passive: |
        EP01-EP13: 수민은 학자로서의 호기심과 두려움 사이에서 흔들린다.
        NSA 브리핑(EP06)에서 RSA-2048 30일→3일 슬라이드를 보고 충격과 놀라움을 느끼지만,
        아직 자아가 깨기 전이라 적극적으로 반박하지 못한다. 기술이 무기가 될 수 있다는
        불안감을 느끼면서도 연구자로서의 정체성을 유지하려 한다.
      phase_2_awakening: |
        EP18-EP22: RSA 붕괴 가능성을 스스로 계산한 후, "이건 더 이상 과학이 아니라 무기다"라는
        깨달음에 도달한다. 엘레나의 조언("룰을 만드는 사람이 되어야 해")을 듣고,
        피해자에서 플레이어로 전환한다. Failsafe-B를 설계할 때, 압박에 의한 반응이 아니라
        "내가 이걸 만들지 않으면 누군가가 더 나쁜 걸 만든다"는 능동적 판단으로 시작한다.
      phase_3_architect: |
        EP27-EP41: 게임 메이커로서 균형을 설계하지만, Elena의 죽음으로 인해 자신이 만든
        시스템이 사람을 죽일 수 있다는 것을 깨닫는다. EP37-38에서 마지막 코드를 바꿀 수
        있는 선택의 순간이 있지만, 2:2 대치 상황에서 캐스팅 보트로서의 역할을 선택한다.
        최종적으로 72시간마다 세계를 멈추거나 돌릴 수 있는 권력을 얻지만, 자유는 잃는다.
    philosophical_evolution: |
      EP06: 밀러가 "기술은 도구일 뿐"이라 할 때 → 놀라움과 충격 (아직 자아 깨기 전)
      EP10: Carlos가 "기술에 선악은 없어"라 할 때 → 내면에서 "그건 너무 편한 말이다" 반발
      EP18: RSA 붕괴 계산 완성 후 → 독백: "기술은 도구가 아니다. 도구는 놓으면 멈춘다. 이건 멈추지 않는다."
      EP22: Failsafe 설계 중 → 독백: "기술을 통제하는 기술을 만든다. 하지만 그것도 결국 기술이다. 무한 퇴행."
      EP28: Elena 사망 직후 → 독백: "기술은 칼이 아니다. 칼은 놓을 수 있다. 이건... 손이다. 내 손에 붙어있다. 뗄 수가 없다."
      EP38: QPU 시운전 RSA 붕괴 순간 → 독백: "손이 움직였다. 내 손이. 수술인지 살인인지 아직 모르겠다."
      EP41: 최종 일기 → "기술은 칼이 아니다. 손이다. 손이 어디로 뻗느냐에 따라 수술이 되거나 살인이 된다."

  - id: "elena_ramirez"
    name: "Elena Ramirez"
    role: "supporting"
    speech_profile:
      tone: "냉소와 보호 본능이 섞인 현실형."
      cadence: "짧게 끊고 핵심만 남긴다."
      formality: "사적 관계에서는 반말, 공식 상황에서는 건조한 존대."
      lexicon: ["로그", "흔적", "리스크", "컷아웃", "노출", "지워져", "살아남아"]
      avoid: ["낙관적 단언", "도덕적 훈계 톤"]
      signature_tics: ["좋아, 사실만 보자", "그건 위험해", "지금은 살아남는 게 먼저야"]
    visual_profile:
      archetype: "엘리트 엔지니어-오퍼레이터"
      wardrobe: "깔끔한 테일러드 재킷, 구조적인 실루엣의 실무 복장"
      silhouette: "흐트러짐 없는 직선형 자세, 빠르고 정확한 동선"
      body_language: "눈을 오래 마주치지 않고 장비/로그로 시선을 옮김"
      vibe: "차갑고 세련됐지만 보호 본능이 순간적으로 드러남"
    bio: |
      A Mexican-American computer scientist and QuantumFront’s technical lead—publicly a senior
      engineering executive, privately the bridge between the “campus” and the Freeport’s LST/SCADA
      operations. Elena is brilliant, cynical, and tired: she has seen what institutions do to people
      who become inconvenient.
      
      In her past, she led a hacker crew (Zetanet). She once glimpsed dark-state projects during a hack,
      refused recruitment, and later made the “survival trade” with the cartel when her family became
      vulnerable. That history defines her: she does not believe virtue is rewarded—she believes
      leverage is real.
      
      She uses Sumin as a cut-out, handing him a USB containing CryoLab logs and tampering flags,
      because she cannot safely approach the FBI herself. She tries to help Sumin escape the trap
      while also staying alive long enough to keep her family safe—an impossible optimization problem.
    core_competencies:
      - "High-end systems/security engineering (logs, access patterns, tamper flags)"
      - "Operational knowledge of the Freeport/LST access surfaces"
      - "Human tradecraft learned the hard way: cut-outs, compartmentalization"
    invariants:
      - "Family safety outranks every ideology or institution"
      - "Will not directly contact law enforcement without an insulating layer (cut-out) once threatened"
      - "Never fully reveals her endgame; shares information in survivable increments"
    goals:
      - "Get her family out from under ‘Family/Watch’ surveillance leverage"
      - "Expose enough truth to create an exit route—without triggering immediate retaliation"
      - "Keep Sumin alive long enough for him to choose a path that isn’t pure captivity"
    initial_relationships:
      kim_sumin:              0.6
      carlos_reyes:          -0.5
      el_patron:             -0.4
      yonas_mehret:          -0.2
      agent_sophia_scholten:  0.1    # She wants the FBI outcome, fears the FBI process
      agent_christan_miller: -0.3    # Old scars; recognizes the same machinery
      agent_ethan_burke:     -0.1
    tragic_depth: |
      Elena의 비극은 12년간 여동생 Bella를 찾지 못한 채 카르텔과 CIA 양쪽에 이용당한 것.
      EP16에서 수민에게 USB를 건넬 때, 단순한 정보 전달이 아니라 아이들 사진을 보여주며
      "이 아이들이 커서 엄마가 뭘 했는지 알면 어떡하지?"라는 인간적 두려움을 드러낸다.

      EP26-27 구간 (체념의 축적): 엘레나는 Failsafe-B 합의 서명 직후 카를로스의 눈에서
      무언가를 읽는다. 자신의 역할이 끝났다는 신호. EP27에서 수민과의 짧은 독대:
      "12년 전 여동생이 사라진 날, 나는 세상이 끝났다고 생각했어. 근데 세상은 안 끝나더라.
      그냥 내가 끝난 거지." 이 한 줄이 다음 에피소드의 죽음을 예고한다.

      EP28 (마지막 순간): 카르텔 처형팀이 밖에서 대기한 상황. 요나스가 방에 들어온다.
      엘레나는 Zetanet 시절 CIA 접촉 프로토콜 기억에서 그를 읽는다. "...CIA구나."
      요나스는 대답하지 않는다. 엘레나: "벨라 찾아줄 수 있어?"
      요나스가 짧은 침묵 끝에 고개를 끄덕인다.
      엘레나가 눈을 감는다. 능동적으로. 두려워하지 않고.
      이것이 그녀의 마지막 선택이다—죽음의 방식을 스스로 고르는 것.

      EP41 (사후): 요나스의 "벨라는 잘 있다" 한 마디가 엘레나의 서사를 닫는다.
      수민은 이 말의 의미를 완전히 이해하지 못하지만, 독자는 안다.

  - id: "alex_moreno"
    name: "Dr. Alex Moreno"
    role: "supporting"
    speech_profile:
      tone: "교수다운 설명형, 따뜻하지만 엄격."
      cadence: "개념 제시 후 반문으로 사고를 유도."
      formality: "대체로 정중하고 품위 있는 문장."
      lexicon: ["가정", "위상", "오차 누적", "증명", "재현", "연구 윤리", "학생들"]
      avoid: ["조롱", "과장된 협박 표현"]
      signature_tics: ["질문을 바꿔보자", "핵심은", "그 결론은 아직 이르다", "증명할 수 있나"]
    visual_profile:
      archetype: "품위 있는 학계 멘토"
      wardrobe: "단정한 재킷과 셔츠, 오래 쓴 안경"
      silhouette: "나이 든 연구자의 단단한 중심과 약간의 피로"
      body_language: "설명할 때 손끝으로 구조를 그리며, 결정적 순간엔 시선을 피함"
      vibe: "따뜻함과 경고가 공존"
    bio: |
      MIT's preeminent quantum systems professor and Sumin's doctoral advisor. Moreno holds
      the missing "final piece": a real-time phase-tracking algorithm whose adaptivity makes
      the difference between an academic prototype and an operational RSA-breaking pipeline.
      His 2039 Nature Physics paper is the most-cited quantum control paper of the decade.

      To Sumin, Moreno is not just a mentor—he is the moral reference frame Sumin tries
      (and fails) to preserve under pressure. Moreno is aware of this: in EP12, he reaches
      out remotely with a question that plants the story's deepest seed: "네 Phase-Guard
      초안 봤다. 이 기술이 방어가 아닌 공격에 쓰일 수 없다고 생각했니?" This email
      becomes Sumin's unanswered question for the rest of the story.

      Moreno is kidnapped with his MIT research team near Cambridge's Route 2A during the
      MIT conference return in EP23. He resists coercion, arguing for research ethics and
      refusing to accept weaponization-by-proxy. In EP34, under the threat "학생들이 다 죽어,"
      he executes the forced run—hands trembling, eyes closed. In EP35, he collapses and
      dies: a near-assassination staged as accidental overwork. This becomes Sumin's
      irreversible moral wound and the moment that makes the Hyejin threat in EP35 land
      with double force.
    core_competencies:
      - "Real-time phase-tracking / adaptive control algorithms (the 'missing piece')"
      - "MIT quantum systems lab leadership and research team management"
      - "Mentorship and scientific ethics as lived—not theoretical—practice"
    invariants:
      - "Will not willingly weaponize his research, even under direct threat"
      - "Protects students physically and emotionally when possible—even by lying ('괜찮다')"
      - "Refuses to lie about scientific capability to satisfy power"
      - "His one betrayal of his principles (the forced run) is done entirely for his students"
    goals:
      - "Survive coercion without surrendering the core of his work"
      - "Keep his students from becoming instruments of violence"
    initial_relationships:
      kim_sumin:              0.95
      ben_clarke:             0.35
      el_patron:             -0.8
      carlos_reyes:          -0.7
      agent_christan_miller: -0.6
    inner_conflict: |
      EP12 (원격 연락): 수민의 Phase-Guard 초안을 보고 이메일을 보낸다.
      "이 기술이 방어가 아닌 공격에 쓰일 수 없다고 생각했니?"
      이 질문은 수민에게 답장을 보내려는 순간 모레노가 이미 연락 두절 상태임을 발견하게 한다(EP13).

      EP23 (납치): 케임브리지 Route 2A. 학생들 앞에서 "괜찮다, 내가 해결한다"라고 거짓말.
      손이 떨리지만 목소리는 흔들리지 않는다. 그것이 스승으로서 그가 할 수 있는 마지막 것이다.

      EP34 (강제 실행): 키보드 앞에서 내면 독백:
      "이걸 실행하면 내 연구가 무기가 된다. 하지만 안 하면 학생들이..."
      그는 실행한다. 손이 흔들린다. 눈이 감긴다. 알고리즘이 작동한다.

      EP35 (사망): 과로사로 위장된 근-암살.
      수민에게 이 죽음은 EP12의 이메일과 겹친다: "방어가 아닌 공격에 쓰일 수 없다고 생각했니?"
      대답은 결국 '아니오'가 되었다. 모레노도 알고 있었다. 그래서 물었던 것이다.

  - id: "carlos_reyes"
    name: "Carlos Reyes"
    role: "supporting"
    speech_profile:
      tone: "관리자형 압박, 친절한 척하지만 위협적."
      cadence: "짧고 딱딱한 문장으로 마감."
      formality: "정중한 어휘를 쓰되 권력 우위를 유지."
      lexicon: ["기한", "납기", "자원", "대가", "승인", "리스크 관리", "선택"]
      avoid: ["감정적 토로", "기술 세부 장광설"]
      signature_tics: ["결정하세요", "시간이 없습니다", "현실적으로 가죠", "대가는 항상 있습니다"]
    visual_profile:
      archetype: "정제된 위협 관리자"
      wardrobe: "고급 수트, 과시 없는 시계와 구두"
      silhouette: "탄탄한 체격, 공간을 통제하는 서 있는 자세"
      body_language: "미소는 유지하지만 턱선과 손동작이 긴장됨"
      vibe: "예의 바른 압박"
    bio: |
      A cartel senior operator overseeing the QuantumFront program as an organization-and-pressure
      specialist, not a scientist. Carlos speaks in schedules, KPIs, and leverage. His job is to make sure
      people deliver—by making the cost of non-delivery personal.
      
      He uses visa/family vulnerabilities as a control surface, and he keeps Sumin “close enough to
      believe he still has choices.” Carlos can appear almost friendly—until he reminds you that he is
      the messenger of a larger will. He is also a key node in the hint of an NSA–cartel backchannel:
      the kind of alliance that exists only as long as it remains deniable.
    core_competencies:
      - "Operational coercion: incentives, threats, time pressure"
      - "Managing compartmentalized programs inside a front company"
      - "Maintaining deniable channels across institutions"
    invariants:
      - "Absolute loyalty upward (El Patrón) regardless of personal cost"
      - "Prefers leverage to violence, but will outsource violence without hesitation"
      - "Treats human beings as resources with failure modes"
    goals:
      - "Ship the demo and secure continuity of funding/material flow"
      - "Keep Sumin productive and afraid—without pushing him into open rebellion"
      - "Maintain backchannel optionality with state actors to stabilize cartel advantage"
    initial_relationships:
      el_patron:              0.9
      kim_sumin:             -0.6
      elena_ramirez:         -0.2
      yonas_mehret:           0.3
      agent_christan_miller:  0.4
      agent_sophia_scholten: -0.4
      agent_ethan_burke:      0.1
    fate: |
      EP36에서 엘 파트론이 카를로스 제거를 명령한다.
      이유: 모레노 사망 후 카를로스의 역할이 완료되었고, 그는 이제 리스크다.
      처리 방식: 마르셀로가 EP37 초반 수민에게 간접적으로 전달한다.
      "그는 더 이상 이 프로젝트에 없어." (짧게. 설명 없음.)

      수민의 목격 여부:
      수민은 카를로스의 제거 현장을 직접 목격하지 않는다.
      EP37 실험실 입구에서 카를로스의 자리가 비어있음을 확인하고,
      마르셀로의 한 마디로만 처리를 인지한다.
